    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0A1628;
            --navy-light: #0F2236;
            --blue: #4A8FD4;
            --teal: #00BFA5;
            --green: #34D399;
            --red: #F87171;
            --amber: #FBbf24;
            --slate: #8A9BB0;
            --bg: #0A1628;
            --card: #0F2236;
            --border: #1E3347;
            --text-primary: #E8EDF2;
            --text-secondary: #8A9BB0;
            --surface: #132A42;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--navy); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--slate); }

        /* Header */
        .header {
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(4px);
            color: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(30, 51, 71, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-divider {
            width: 1px;
            height: 1.5rem;
            background: rgba(255, 255, 255, 0.15);
        }

        .breadcrumb {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        .btn-primary {
            background-color: var(--teal);
            color: white;
        }

        .btn-primary:hover {
            background-color: #00A890;
            box-shadow: 0 4px 12px rgba(0, 191, 165, 0.3);
        }

        .btn-secondary {
            background-color: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--card);
            border-color: var(--blue);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Tables */
        .table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .table thead {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .table th {
            padding: 0.875rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--slate);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid rgba(30, 51, 71, 0.5);
            font-size: 0.875rem;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
        }

        .table tbody tr:hover {
            background-color: rgba(30, 51, 71, 0.4);
            cursor: pointer;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        /* KPI Cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .kpi-card:hover {
            border-color: rgba(74, 143, 212, 0.3);
        }

        .kpi-label {
            font-size: 0.6875rem;
            color: var(--slate);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            font-family: 'JetBrains Mono', monospace;
        }

        .kpi-trend {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .kpi-trend.positive {
            color: var(--green);
        }

        .kpi-trend.negative {
            color: var(--red);
        }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .assumptions-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .slider-group {
            background: var(--card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
        }

        .slider-item {
            margin-bottom: 1.5rem;
        }

        .slider-item:last-child {
            margin-bottom: 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .slider-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.8125rem;
        }

        .slider-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--blue);
            font-size: 0.8125rem;
        }

        .slider {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(74, 143, 212, 0.4);
            border: 2px solid var(--card);
        }

        .slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(74, 143, 212, 0.4);
            border: 2px solid var(--card);
        }

        .slider-range {
            display: flex;
            justify-content: space-between;
            font-size: 0.6875rem;
            color: var(--slate);
            margin-top: 0.5rem;
        }

        /* Chat Widget */
        .chat-widget {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 500px;
            position: sticky;
            top: 5rem;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chat-message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.8125rem;
            line-height: 1.4;
        }

        .chat-message.user {
            background: rgba(74, 143, 212, 0.15);
            color: var(--blue);
            align-self: flex-end;
            max-width: 80%;
            border: 1px solid rgba(74, 143, 212, 0.3);
        }

        .chat-message.assistant {
            background: var(--surface);
            color: var(--text-primary);
            align-self: flex-start;
            max-width: 90%;
            border: 1px solid var(--border);
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.8125rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text-primary);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(74, 143, 212, 0.15);
        }

        /* Sensitivity Table */
        .sensitivity-table {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .sensitivity-grid {
            border-collapse: collapse;
            min-width: 800px;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .sensitivity-grid th {
            background: var(--surface);
            color: var(--slate);
            padding: 0.75rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sensitivity-grid td {
            padding: 0.75rem;
            text-align: center;
            font-size: 0.8125rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgba(30, 51, 71, 0.5);
            color: var(--text-primary);
        }

        .sensitivity-grid tr:first-child td:first-child {
            background: var(--surface);
        }

        .sensitivity-cell {
            position: relative;
        }

        .sensitivity-cell.above {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }

        .sensitivity-cell.below {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
        }

        /* Upload Area */
        .upload-container {
            max-width: 600px;
            margin: 3rem auto;
        }

        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(15, 34, 54, 0.5);
        }

        .dropzone:hover,
        .dropzone.active {
            background: rgba(74, 143, 212, 0.08);
            border-color: var(--blue);
        }

        .dropzone-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .dropzone-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .dropzone-hint {
            font-size: 0.875rem;
            color: var(--slate);
            margin-bottom: 1.5rem;
        }

        .file-list {
            margin-top: 1.5rem;
            text-align: left;
        }

        .file-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .file-icon {
            font-size: 1.5rem;
            min-width: 24px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
        }

        .status-draft {
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber);
        }

        .status-completed {
            background: rgba(37, 99, 235, 0.1);
            color: var(--blue);
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Property Header */
        .property-header {
            background: var(--card);
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .property-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            font-family: 'DM Serif Display', serif;
            margin-bottom: 0.5rem;
        }

        .property-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .property-detail {
            border-left: 3px solid var(--blue);
            padding-left: 1rem;
        }

        .property-detail-label {
            font-size: 0.75rem;
            color: var(--slate);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .property-detail-value {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .chat-widget {
                position: relative;
                top: 0;
                height: auto;
                min-height: 300px;
            }

            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .kpi-row {
                grid-template-columns: 1fr;
            }

            .property-details {
                grid-template-columns: 1fr;
            }

            .sensitivity-grid {
                font-size: 0.8rem;
            }

            .sensitivity-grid td,
            .sensitivity-grid th {
                padding: 0.5rem;
            }

            .table th,
            .table td {
                padding: 0.75rem;
            }
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 2rem;
        }

        /* Section Titles */
        .section-title {
            font-size: 1.3125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.5rem;
            background: var(--blue);
            border-radius: 2px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--slate);
        }

        .empty-state-icon {
            font-size: 3rem;

        .empty-state-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
    </style>
</head>

        // Utility Functions
        const formatCurrency = (value) => {
            if (value == null || isNaN(value)) return '—';
            if (value >= 1000000) {
                return `$${(value / 1000000).toFixed(1)}M`;
            } else if (value >= 1000) {
                return `$${(value / 1000).toFixed(1)}K`;
            }
            return `$${value.toFixed(0)}`;
        };

        const formatPercent = (value) => value != null && isFinite(value) ? `${(value * 100).toFixed(2)}%` : '—';

        const formatPSF = (value) => value != null && isFinite(value) ? `$${value.toFixed(2)}/SF` : '—';

        const formatSF = (value) => `${(value || 0).toLocaleString('en-US', { maximumFractionDigits: 0 })} SF`;

        const formatRatio = (value) => `${(value || 0).toFixed(2)}x`;

        // Financial Calculations
        const monthlyPayment = (principal, annualRate, amortYears) => {
            const r = annualRate / 12;
            const n = amortYears * 12;
            if (r === 0) return principal / n;
            return principal * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        };

        const annualDebtService = (principal, annualRate, amortYears) => {
            return monthlyPayment(principal, annualRate, amortYears) * 12;
        };

        const annualDebtServiceIO = (principal, annualRate) => {
            return principal * annualRate;
        };

        const loanBalanceAtYear = (principal, annualRate, amortYears, yearN) => {
            const r = annualRate / 12;
            const n = amortYears * 12;
            const p = yearN * 12;
            const pmt = monthlyPayment(principal, annualRate, amortYears);
            if (r === 0) return principal - (pmt * p);
            return principal * Math.pow(1 + r, p) - pmt * (Math.pow(1 + r, p) - 1) / r;
        };

        const calculateIRR = (cashFlows, guess = 0.10) => {
            let rate = guess;
            for (let i = 0; i < 100; i++) {
                let npv = 0, dnpv = 0;
                for (let t = 0; t < cashFlows.length; t++) {
                    npv += cashFlows[t] / Math.pow(1 + rate, t);
                    dnpv -= t * cashFlows[t] / Math.pow(1 + rate, t + 1);
                }
                if (Math.abs(dnpv) < 1e-12) break;
                const newRate = rate - npv / dnpv;
                if (Math.abs(newRate - rate) < 1e-8) return newRate;
                rate = newRate;
            }
            return rate;
        };

            if (!apiDeal) return null;
            const pd = apiDeal.parsed_data || {};
            const prop = pd.property || {};
            const fin = pd.financials || {};
            const assumptions = apiDeal.assumptions || pd.assumptions || {};

            const raw_asking_price = prop.asking_price || fin.asking_price || 0;
            const noi = fin.noi || 0;
            const total_sf = prop.total_sf || fin.total_sf || 0;
            const cap_rate = fin.cap_rate
                ? (fin.cap_rate > 1 ? fin.cap_rate / 100 : fin.cap_rate)
                : 0.07;  // Default 7% cap if not extracted
            // If no asking price found on page 1, derive from NOI / Cap Rate
            const asking_price = raw_asking_price > 0 ? raw_asking_price : (noi > 0 && cap_rate > 0 ? Math.round(noi / cap_rate) : 0);

            return {

                rentable_sf: total_sf,

                return mapApiDealToFlatDeal(apiDeal);

                return null;
            }

            }
            const formData = new FormData();
            files.forEach(file => {
                const ext = file.name.toLowerCase().split('.').pop();
                if (ext === 'pdf') {
                    formData.append('pdf_file', file);
                } else if (['xlsx', 'xls', 'csv'].includes(ext)) {
                    formData.append('excel_file', file);
                }
            });
            try {
                const res = await fetch(`${API_URL}/api/v1/deals`, {
                    method: 'POST',
                    body: formData
                });
                if (!res.ok) throw new Error('Upload failed');
                return await res.json();
            } catch (error) {
                console.error('Upload error:', error);
                throw error;
            }
        };

        const KPICard = ({ label, value, trend, format = 'currency' }) => {
            let formattedValue = value;
            if (format === 'currency') formattedValue = formatCurrency(value);
            else if (format === 'percent') formattedValue = formatPercent(value);
            else if (format === 'psf') formattedValue = formatPSF(value);
            else if (format === 'sf') formattedValue = formatSF(value);
            else if (format === 'ratio') formattedValue = formatRatio(value);

            return (
                <div className="kpi-card">
                    <div className="kpi-label">{label}</div>
                    <div className="kpi-value">{formattedValue}</div>
                    {trend && (
                        <div className={`kpi-trend ${trend > 0 ? 'positive' : 'negative'}`}>
                            {trend > 0 ? '↑' : '↓'} {Math.abs(trend).toFixed(1)}%
                        </div>
                    )}
                </div>
            );
        };

        const exportDealToExcel = async (deal, overrides, assumptions) => {
            const payload = {
                property_name: deal.property_name || 'Untitled Deal',
                address: deal.address,
                property_type: deal.property_type,
                asking_price: overrides?.asking_price || deal.asking_price,
                noi: overrides?.noi || deal.noi,
                cap_rate: overrides?.cap_rate || deal.cap_rate,
                rentable_sf: overrides?.rentable_sf || deal.rentable_sf,
                assumptions: assumptions || deal.assumptions,
                rent_roll: deal.rent_roll || [],
                source: deal.source || 'om',
                argus_detail: deal.argus_detail || null,
            };
            try {
                const res = await fetch(`${API_URL}/api/v1/export`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) throw new Error('Export failed');
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${(deal.property_name || 'Deal').replace(/\s+/g, '_')}_Analysis.xlsx`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Export error:', error);
                alert('Failed to export to Excel: ' + error.message);
            }
        };

        const deleteDeal = async (dealId) => {
            try {
                const res = await fetch(`${API_URL}/api/v1/deals/${dealId}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');
                return true;
            } catch (error) {
                console.error('Delete error:', error);
                return false;
            }
        };

        const DealListView = ({ onSelectDeal, onUpload }) => {
            const [deals, setDeals] = useState([]);
            const [loading, setLoading] = useState(true);
            const [dealCount, setDealCount] = useState({ count: 0, limit: 10, can_upload: true });

            useEffect(() => {
                const load = async () => {
                    const [data, countRes] = await Promise.all([
                        fetchDeals(),
                        fetch(`${API_URL}/api/v1/deals/count`, { credentials: 'include' }).then(r => r.ok ? r.json() : null).catch(() => null),
                    ]);
                    setDeals(data || []);
                    if (countRes) setDealCount(countRes);
                    setLoading(false);
                };
                load();
            }, []);

            const handleDelete = async (e, dealId, dealName) => {
                e.stopPropagation();
                if (!confirm(`Delete "${dealName || 'this deal'}"? This cannot be undone.`)) return;
                const success = await deleteDeal(dealId);
                if (success) {
                    setDeals(prev => prev.filter(d => d.id !== dealId));
                    setDealCount(prev => ({ ...prev, count: Math.max(0, prev.count - 1), can_upload: true }));
                } else {
                    alert('Failed to delete deal');
                }
            };

                                            <td>{formatCurrency(deal.asking_price)}</td>

                                                <button className="btn btn-sm btn-secondary" onClick={(e) => {
                                                    e.stopPropagation();
                                                    onSelectDeal(deal.id);
                                                }}>
                                                    View
                                                </button>
                                                <button className="btn btn-sm" onClick={(e) => handleDelete(e, deal.id, deal.property_name)}
                                                    style={{ background: 'var(--red)', color: 'white', border: 'none', padding: '0.25rem 0.6rem', borderRadius: '4px', fontSize: '0.75rem', cursor: 'pointer' }}>
                                                    ✕
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        const UploadView = ({ onCancel, onSuccess }) => {
            const [files, setFiles] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [dragActive, setDragActive] = useState(false);

            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(e.type === 'dragenter' || e.type === 'dragover');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                const dropped = [...e.dataTransfer.files];
                setFiles(prev => [...prev, ...dropped]);
            };

            const handleAnalyze = async () => {
                if (files.length === 0) return;
                setUploading(true);
                try {
                    const result = await uploadDeal(files);
                    onSuccess(result.id);
                } catch (error) {
                    alert('Error uploading deal: ' + error.message);
                    setUploading(false);
                }
            };

            const getFileIcon = (file) => {
                if (file.type.includes('pdf')) return '📄';
                if (file.type.includes('excel') || file.type.includes('spreadsheet')) return '📊';
                return '📁';
            };

            return (
                <div className="container">
                    <button className="btn btn-secondary btn-sm" onClick={onCancel} style={{ marginBottom: '2rem' }}>

                                type="file"
                                multiple

                            />

                        {files.length > 0 && (
                            <div className="file-list">
                                {Array.from(files).map((file, idx) => (
                                    <div key={idx} className="file-item">
                                        <div className="file-icon">{getFileIcon(file)}</div>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ fontWeight: 600 }}>{file.name}</div>
                                            <div style={{ fontSize: '0.8125rem', color: 'var(--slate)' }}>
                                                {(file.size / 1024 / 1024).toFixed(1)} MB
                                            </div>
                                        </div>
                                        <button
                                            className="btn btn-sm btn-secondary"
                                            onClick={() => setFiles(files.filter((_, i) => i !== idx))}

                                        </button>

                                <button
                                    className="btn btn-primary"
                                    onClick={handleAnalyze}
                                    disabled={uploading}
                                    style={{ marginTop: '1.5rem', width: '100%' }}
                                >
                                    {uploading ? (
                                        <>
                                            <span className="loading"></span> Analyzing Deal...
                                        </>
                                    ) : (
                                        '🔍 Analyze Deal'
                                    )}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const SensitivityTable = ({ asking_price, noi, assumptions }) => {
            const capRates = [0.050, 0.0525, 0.055, 0.0575, 0.060, 0.0625, 0.065, 0.0675, 0.070, 0.0725, 0.080];
            const noiGrowths = [-0.05, -0.025, 0, 0.025, 0.05, 0.075, 0.10];

            const getValue = (cap, growth) => {
                const exitNOI = noi * Math.pow(1 + growth, assumptions.hold_period);
                const value = exitNOI / cap;
                return value;
            };

            return (
                <div>
                    <div className="section-title">Sensitivity Analysis: Property Value</div>
                    <div className="sensitivity-table">
                        <table className="sensitivity-grid">
                            <thead>
                                <tr>
                                    <th>NOI Growth / Exit Cap</th>
                                    {capRates.map(cap => (
                                        <th key={cap}>{formatPercent(cap)}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {noiGrowths.map(growth => {
                                    const values = capRates.map(cap => getValue(cap, growth));
                                    const maxVal = Math.max(...values);
                                    const minVal = Math.min(...values);

                                    return (
                                        <tr key={growth}>
                                            <th style={{ background: 'var(--bg)', textAlign: 'left', fontWeight: 600, color: 'var(--text-primary)' }}>
                                                {formatPercent(growth)}
                                            </th>
                                            {capRates.map(cap => {
                                                const value = getValue(cap, growth);
                                                const isAbove = value > asking_price;
                                                return (
                                                    <td
                                                        key={cap}
                                                        className={`sensitivity-cell ${isAbove ? 'above' : 'below'}`}
                                                    >
                                                        {formatCurrency(value / 1000000)}M
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const CashFlowTable = ({ noi, asking_price, assumptions, rentable_sf }) => {
            const cashFlows = [];
            const initialDebt = asking_price * (assumptions.ltv || 0.65);
            const equity = asking_price * (1 - (assumptions.ltv || 0.65));
            const isIO = assumptions.interest_only;
            const holdYears = isIO ? (assumptions.io_term || 5) : assumptions.hold_period;
            const ds = isIO
                ? annualDebtServiceIO(initialDebt, assumptions.interest_rate)
                : annualDebtService(initialDebt, assumptions.interest_rate, assumptions.amortization_years);

            for (let year = 1; year <= holdYears; year++) {
                const yearNOI = noi * Math.pow(1 + assumptions.noi_growth, year);
                const capReserves = rentable_sf * 0.4; // $0.40/SF
                const cashFlow = yearNOI - ds - capReserves;
                const balance = isIO
                    ? initialDebt
                    : loanBalanceAtYear(initialDebt, assumptions.interest_rate, assumptions.amortization_years, year);
                const coc = equity > 0 ? (yearNOI - ds) / equity : 0;

                cashFlows.push({ year, noi: yearNOI, ds, capReserves, cashFlow, balance, coc });
            }

            return (
                <div>
                    <div className="section-title">
                        Cash Flow Projection {isIO && <span style={{ fontSize: '0.7rem', background: 'rgba(0,191,165,0.15)', color: '#00BFA5', padding: '2px 6px', borderRadius: '4px', fontWeight: 600, marginLeft: '8px' }}>IO</span>}
                    </div>
                    <div style={{ overflowX: 'auto' }}>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Year</th>
                                    <th>NOI</th>
                                    <th>Debt Service</th>
                                    <th>Cap Reserves</th>
                                    <th>Cash Flow</th>
                                    <th>Loan Balance</th>
                                    <th>Cash-on-Cash</th>
                                </tr>
                            </thead>
                            <tbody>
                                {cashFlows.map(cf => (
                                    <tr key={cf.year}>
                                        <td><strong>{cf.year}</strong></td>
                                        <td>{formatCurrency(cf.noi)}</td>
                                        <td>{formatCurrency(cf.ds)}</td>
                                        <td>{formatCurrency(cf.capReserves)}</td>
                                        <td style={{ fontWeight: 600, color: cf.cashFlow > 0 ? 'var(--green)' : 'var(--red)' }}>
                                            {formatCurrency(cf.cashFlow)}
                                        </td>
                                        <td>{formatCurrency(cf.balance)}</td>
                                        <td style={{ fontWeight: 600, color: cf.coc > 0.08 ? 'var(--green)' : cf.coc > 0 ? 'var(--amber)' : 'var(--red)' }}>
                                            {formatPercent(cf.coc)}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const IRRMatrix = ({ noi, asking_price, assumptions }) => {
            const exitCaps = [0.055, 0.060, 0.065, 0.070, 0.075, 0.080];
            const holdPeriods = [3, 5, 7, 10];

            const calculateIRRCell = (exitCap, hold) => {
                const equity = asking_price * (1 - (assumptions.ltv || 0.65));
                const debt = asking_price * (assumptions.ltv || 0.65);
                const isIO = assumptions.interest_only;

                const cfs = [-equity];
                for (let y = 1; y <= hold; y++) {
                    const yearNOI = noi * Math.pow(1 + assumptions.noi_growth, y);
                    const ds = isIO
                        ? annualDebtServiceIO(debt, assumptions.interest_rate)
                        : annualDebtService(debt, assumptions.interest_rate, assumptions.amortization_years);
                    const capReserves = assumptions.sf ? assumptions.sf * 0.4 : 0;
                    cfs.push(yearNOI - ds - capReserves);
                }

                // Sale proceeds
                const exitNOI = noi * Math.pow(1 + assumptions.noi_growth, hold);
                const salePrice = exitNOI / exitCap;
                const loanBal = isIO ? debt : loanBalanceAtYear(debt, assumptions.interest_rate, assumptions.amortization_years, hold);
                cfs[cfs.length - 1] += (salePrice - loanBal);

                return calculateIRR(cfs);
            };

            return (
                <div>
                    <div className="section-title">IRR Sensitivity Analysis</div>
                    <div style={{ overflowX: 'auto' }}>
                        <table className="sensitivity-grid">
                            <thead>
                                <tr>
                                    <th>Exit Cap / Hold Period</th>
                                    {holdPeriods.map(hold => (
                                        <th key={hold}>{hold}Y</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {exitCaps.map(cap => (
                                    <tr key={cap}>
                                        <th style={{ background: 'var(--bg)', textAlign: 'left', fontWeight: 600, color: 'var(--text-primary)' }}>
                                            {formatPercent(cap)}
                                        </th>
                                        {holdPeriods.map(hold => {
                                            const irr = calculateIRRCell(cap, hold);
                                            return (
                                                <td
                                                    key={hold}
                                                    className={`sensitivity-cell ${irr > 0.15 ? 'above' : 'below'}`}
                                                >
                                                    {formatPercent(irr)}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ChatWidget = ({ dealId }) => {
            const [messages, setMessages] = useState([
                { id: 1, type: 'assistant', text: "I've analyzed this offering memorandum. Ask me anything about the deal — financials, risk factors, comparable analysis, or scenario modeling." }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEnd = useRef(null);

            const scrollToBottom = () => {
                messagesEnd.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { id: prev.length + 1, type: 'user', text: userMessage }]);
                setLoading(true);

                if (DEMO_MODE) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    setMessages(prev => [...prev, {
                        id: prev.length + 1,
                        type: 'assistant',
                        text: `Great question about "${userMessage}". Based on the deal analysis, this is a strong value-add opportunity with significant upside potential. The current cap rate of 6.0% offers attractive yield, and the rent growth assumptions are conservative relative to market trends.`
                    }]);
                    setLoading(false);
                    return;
                }

                try {
                    const res = await fetch(`${API_URL}/api/v1/deals/${dealId}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMessage })
                    });

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let assistantMessage = '';
                    let messageId = messages.length + 1;

                    setMessages(prev => [...prev, { id: messageId, type: 'assistant', text: '' }]);

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value);
                        assistantMessage += chunk;

                        setMessages(prev => {
                            const updated = [...prev];
                            updated[updated.length - 1].text = assistantMessage;
                            return updated;
                        });
                    }
                } catch (error) {
                    setMessages(prev => [...prev, {
                        id: prev.length + 1,
                        type: 'assistant',
                        text: 'Error connecting to chat service. Please try again.'
                    }]);
                }

                setLoading(false);
            };

            return (
                <div className="chat-widget">
                    <div className="chat-header">💬 Deal Insights</div>
                    <div className="chat-messages">
                        {messages.map(msg => (
                            <div key={msg.id} className={`chat-message ${msg.type}`}>
                                {msg.text}
                            </div>
                        ))}
                        <div ref={messagesEnd} />
                    </div>
                    <form className="chat-input-area" onSubmit={handleSendMessage}>
                        <input
                            type="text"
                            className="chat-input"
                            placeholder="Ask about the deal..."
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            disabled={loading}
                        />
                        <button type="submit" className="btn btn-primary btn-sm" disabled={loading || !input.trim()}>
                            {loading ? <span className="loading"></span> : '→'}
                        </button>
                    </form>
                </div>
            );
        };

        const RentRollTable = ({ rentRoll }) => {
            if (!rentRoll || rentRoll.length === 0) {
                return (
                    <div>
                        <div className="section-title">Rent Roll</div>
                        <div className="card">
                            <div className="empty-state">
                                <div className="empty-state-icon">🏢</div>
                                <div className="empty-state-title">No rent roll data</div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <div className="section-title">Rent Roll</div>
                    <div style={{ overflowX: 'auto' }}>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Unit</th>
                                    <th>Tenant</th>
                                    <th>SF</th>
                                    <th>Rent PSF</th>
                                    <th>Annual Rent</th>
                                    <th>Lease Expiry</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rentRoll.map((unit, idx) => (
                                    <tr key={idx}>
                                        <td><strong>{unit.unit}</strong></td>
                                        <td>{unit.tenant}</td>
                                        <td>{formatSF(unit.sf)}</td>
                                        <td>{formatPSF(unit.rent_psf)}</td>
                                        <td>{formatCurrency(unit.annual_rent)}</td>
                                        <td>{unit.expiry}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════
        // ANALYSIS TAB — Debt Constant, Leverage Check, WALT
        // ═══════════════════════════════════════════════════════
        const AnalysisPanel = ({ deal, assumptions }) => {
            const [amortYears, setAmortYears] = useState(assumptions.amortization_years || 25);
            const [intRate, setIntRate] = useState((assumptions.interest_rate || 0.055) * 100);
            const [targetWALT, setTargetWALT] = useState(5.0);

            // Debt Constant = ADS / Loan Amount
            const loanAmount = deal.asking_price * (assumptions.ltv || 0.65);
            const ads = annualDebtService(loanAmount, intRate / 100, amortYears);
            const debtConstant = loanAmount > 0 ? (ads / loanAmount) : 0;
            const capRate = deal.cap_rate || (deal.noi / deal.asking_price);

            // Leverage spread
            const spread = capRate - debtConstant;
            // Gradient: -3% (deep red) → 0 (yellow) → +3% (deep green)
            const clampedSpread = Math.max(-0.03, Math.min(0.03, spread));
            const pct = (clampedSpread + 0.03) / 0.06; // 0 = deep red, 0.5 = yellow, 1 = green
            const leverageColor = pct < 0.5
                ? `rgb(${Math.round(220)}, ${Math.round(pct * 2 * 180)}, ${Math.round(pct * 2 * 30)})`
                : `rgb(${Math.round((1 - pct) * 2 * 220)}, ${Math.round(160 + (pct - 0.5) * 2 * 40)}, ${Math.round(30 + (pct - 0.5) * 2 * 100)})`;
            const leverageLabel = spread > 0.005 ? 'Positive Leverage' : spread < -0.005 ? 'Negative Leverage' : 'Neutral';

            // WALT calculation from rent roll
            const rentRoll = deal.rent_roll || [];
            const now = new Date();
            let totalWeightedYears = 0;
            let totalSF = 0;
            rentRoll.forEach(lease => {
                const sf = lease.sf || 0;
                const expiry = lease.expiry || lease.lease_end;
                if (expiry && sf > 0) {
                    const expiryDate = new Date(expiry);
                    const yearsRemaining = Math.max(0, (expiryDate - now) / (365.25 * 24 * 60 * 60 * 1000));
                    totalWeightedYears += yearsRemaining * sf;
                    totalSF += sf;
                }
            });
            const currentWALT = totalSF > 0 ? totalWeightedYears / totalSF : 0;
            const waltMeetsTarget = currentWALT >= targetWALT;

            // Debt constant reference table across rates
            const refRates = [3, 4, 5, 5.5, 6, 6.5, 7, 7.5, 8];
            const refAmorts = [15, 20, 25, 30];

            const panelStyle = {
                background: 'var(--card)', borderRadius: '12px', border: '1px solid var(--border)',
                padding: '1.5rem', marginBottom: '1.5rem'
            };
            const sectionTitle = {
                fontSize: '1rem', fontWeight: 700, color: 'var(--text-primary)', marginBottom: '1rem',
                display: 'flex', alignItems: 'center', gap: '0.5rem'
            };

            return (
                <div>
                    {/* Debt Constant Calculator */}
                    <div style={panelStyle}>
                        <div style={sectionTitle}>⚙️ Debt Constant Calculator</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.25rem' }}>
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Amortization</span>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                                        <input type="number" min="10" max="35" step="1"
                                            value={amortYears}
                                            onChange={e => { const v = parseInt(e.target.value); if (v >= 10 && v <= 35) setAmortYears(v); }}
                                            style={{ width: '50px', padding: '0.15rem 0.3rem', fontSize: '0.85rem', fontWeight: 700,
                                                fontFamily: "'JetBrains Mono', monospace", border: '1px solid var(--border)', borderRadius: '4px',
                                                textAlign: 'right', outline: 'none' }} />
                                        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>yrs</span>
                                    </div>
                                </div>
                                <input type="range" className="slider" min="10" max="35" step="1"
                                    value={amortYears} onChange={e => setAmortYears(parseInt(e.target.value))}
                                    style={{ width: '100%' }} />
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: 'var(--slate)' }}>
                                    <span>10 yrs</span><span>35 yrs</span>
                                </div>
                            </div>
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.25rem' }}>
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Interest Rate</span>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                                        <input type="number" min="0" max="15" step="0.01"
                                            value={intRate.toFixed(2)}
                                            onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v >= 0 && v <= 15) setIntRate(v); }}
                                            style={{ width: '65px', padding: '0.15rem 0.3rem', fontSize: '0.85rem', fontWeight: 700,
                                                fontFamily: "'JetBrains Mono', monospace", border: '1px solid var(--border)', borderRadius: '4px',
                                                textAlign: 'right', outline: 'none' }} />
                                        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>%</span>
                                    </div>
                                </div>
                                <input type="range" className="slider" min="3" max="9" step="0.125"
                                    value={intRate} onChange={e => setIntRate(parseFloat(e.target.value))}
                                    style={{ width: '100%' }} />
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: 'var(--slate)' }}>
                                    <span>3.00%</span><span>9.00%</span>
                                </div>
                            </div>
                        </div>

                        {/* Big Debt Constant Display */}
                        <div style={{ textAlign: 'center', padding: '1.5rem', background: 'var(--bg)', borderRadius: '10px', marginBottom: '1.5rem' }}>
                            <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '0.25rem' }}>Debt Constant</div>
                            <div style={{ fontSize: '2.5rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-primary)' }}>
                                {(debtConstant * 100).toFixed(3)}%
                            </div>
                            <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '0.25rem' }}>
                                ADS: {formatCurrency(ads)} &nbsp;|&nbsp; Loan: {formatCurrency(loanAmount)}
                            </div>
                        </div>

                        {/* Reference Table */}
                        <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginBottom: '0.5rem', fontWeight: 600 }}>Debt Constant Reference (Rate × Amortization)</div>
                        <div style={{ overflowX: 'auto' }}>
                            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.75rem' }}>
                                <thead>
                                    <tr style={{ background: 'var(--surface)', color: 'var(--slate)' }}>
                                        <th style={{ padding: '0.4rem 0.6rem', textAlign: 'left' }}>Rate ↓ / Amort →</th>
                                        {refAmorts.map(a => <th key={a} style={{ padding: '0.4rem 0.6rem', textAlign: 'center' }}>{a} yr</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {refRates.map(rate => (
                                        <tr key={rate} style={{ borderBottom: '1px solid var(--border)' }}>
                                            <td style={{ padding: '0.4rem 0.6rem', fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{rate.toFixed(1)}%</td>

// V2 Formatting Helpers
const isN = v => v != null && isFinite(v) && !isNaN(v);

const fmtM = v => isN(v) ? "$" + (v / 1e6).toFixed(2) + "M" : "—";

// V2 IRR Calculator (500 iterations, more robust)
const calcIRRv2 = (cfs) => {
  if (!cfs || cfs.length < 2) return null;
  if (!cfs.some(x => x > 0) || !cfs.some(x => x < 0)) return null;
  let r = 0.1;
  for (let i = 0; i < 500; i++) {
    let f = 0, df = 0;
    for (let t = 0; t < cfs.length; t++) {
      const d = Math.pow(1 + r, t);
      f += cfs[t] / d;
      df -= t * cfs[t] / (d * (1 + r));
    }
    if (Math.abs(df) < 1e-14) break;
    const r2 = r - f / df;
    if (Math.abs(r2 - r) < 1e-10) { r = r2; break; }
    r = r2;
    if (r < -0.9999) return null;
  }
  return isN(r) && r > -0.9999 ? r * 100 : null;
};

// V2 Mortgage annual debt service
const mortgageV2 = (principal, annualRate, termYears) => {
  if (principal <= 0) return 0;
  if (annualRate === 0) return principal / termYears;
  const mr = annualRate / 12, n = termYears * 12;
  return principal * (mr * Math.pow(1 + mr, n)) / (Math.pow(1 + mr, n) - 1) * 12;
};

// V2 Financial Engine — faithful port of TSX runModel with configurable waterfall
const runModelV2 = (p, tenants, events, capItems, wf) => {
  const lpPct = (wf.lpPercent || 90) / 100;
  const gpPct = (wf.gpPercent || 10) / 100;
  const pref = (wf.prefReturn || 8) / 100;

  const pp = p.purchasePrice > 0 ? p.purchasePrice : 0;
  const acqCost = pp * ((p.acqCostPct || 0) / 100);
  const close = p.closingCosts || 0;
  const loan = pp * ((p.ltv || 65) / 100);
  const origFee = loan * ((p.origFee || 1) / 100);
  const totalCost = pp + acqCost + close;
  const equity = totalCost - loan + origFee;
  const dsAmort = mortgageV2(loan, (p.rate || 6.25) / 100, p.amort || 30);
  const dsIO = loan * ((p.rate || 6.25) / 100);

  // Rent-roll-driven revenue arrays (Base Rent + CAM separated) with per-tenant lease expiry
  const hold = p.holdPeriod || 5;
  const rrBaseRent = new Array(hold + 3).fill(0);
  const rrCAM = new Array(hold + 3).fill(0);
  const rrVacancyLoss = new Array(hold + 3).fill(0);
  const rrFreeRent = new Array(hold + 3).fill(0);
  const rrTI = new Array(hold + 3).fill(0);
  const rrLC = new Array(hold + 3).fill(0);

  if (p.useRentRoll && tenants.length > 0) {
    const today = new Date();
    const useML = p.useMarketLeasing !== false;
    const renewProb = (p.marketRenewalProb || 75) / 100;
    const vacMonths = p.marketVacantMonths || 6;
    const freeMonths = p.marketFreeRentMonths || 2;
    const tiNewPSF = p.marketTINewPSF || 15;
    const tiRenewPSF = p.marketTIRenewalPSF || 10;
    const lcNewPct = (p.marketLCNewPct || 6) / 100;
    const lcRenewPct = (p.marketLCRenewalPct || 4) / 100;

    tenants.forEach(t => {
      if (!t.sf || !t.rentPSF) return;
      const ls = new Date(t.start), le = new Date(t.end);
      const sf = t.sf;
      const esc = (t.escalPct || 0) / 100;

      // Determine which model year the lease expires in
      let expiryYr = null;
      for (let yr = 1; yr <= hold + 1; yr++) {
        const yrEnd = new Date(today.getFullYear() + yr, 0, 1);
        const yrStart = new Date(today.getFullYear() + yr - 1, 0, 1);
        if (le >= yrStart && le < yrEnd) { expiryYr = yr; break; }
      }

      for (let yr = 1; yr <= hold + 1; yr++) {
        const yrStart = new Date(today.getFullYear() + yr - 1, 0, 1);
        const elapsed = Math.max(0, (yrStart - ls) / (365.25 * 86400 * 1000));
        const escFactor = Math.pow(1 + esc, elapsed);

        if (!expiryYr || yr < expiryYr) {
          // Pre-expiry: full rent collection
          if (yrStart >= ls) {
            rrBaseRent[yr] += sf * t.rentPSF * escFactor;
            rrCAM[yr] += sf * (t.camPSF || 0) * escFactor;
          }
        } else if (yr === expiryYr && useML) {
          // Expiry year: apply weighted-blend turnover costs
          const monthlyRent = (sf * t.rentPSF * escFactor) / 12;
          const monthlyCam = (sf * (t.camPSF || 0) * escFactor) / 12;

          // Months occupied before expiry in this year
          const yrStartMonth = yrStart.getMonth();
          const leMonth = le.getMonth();
          const occupiedMonths = Math.max(0, Math.min(12, le.getMonth() - yrStart.getMonth() + (le.getFullYear() === yrStart.getFullYear() ? 1 : 12)));

          // Full year of rent (potential)
          const fullBaseRent = sf * t.rentPSF * escFactor;
          const fullCam = sf * (t.camPSF || 0) * escFactor;
          rrBaseRent[yr] += fullBaseRent;
          rrCAM[yr] += fullCam;

          // Weighted vacancy cost: probability-blended
          // If renews: no vacancy, renewal TI/LC only
          // If vacates: vacancy months lost rent, free rent on re-lease, new TI/LC
          const vacCostNew = vacMonths * (monthlyRent + monthlyCam);
          const freeRentCost = freeMonths * monthlyRent;

          // Weighted blend
          const blendedVacancy = (1 - renewProb) * vacCostNew;
          const blendedFreeRent = (1 - renewProb) * freeRentCost;
          const blendedTI = renewProb * (sf * tiRenewPSF) + (1 - renewProb) * (sf * tiNewPSF);
          const blendedLC = renewProb * (fullBaseRent * lcRenewPct) + (1 - renewProb) * (fullBaseRent * lcNewPct);

          rrVacancyLoss[yr] += blendedVacancy;
          rrFreeRent[yr] += blendedFreeRent;
          rrTI[yr] += blendedTI;
          rrLC[yr] += blendedLC;
        } else if (yr === expiryYr && !useML) {
          // No market leasing — just collect rent through expiry
          if (yrStart >= ls) {
            rrBaseRent[yr] += sf * t.rentPSF * escFactor;
            rrCAM[yr] += sf * (t.camPSF || 0) * escFactor;
          }
        } else {
          // Post-expiry: tenant re-leased (or renewed) — continue at market with escalation
          const postExpiryYrs = yr - expiryYr;
          const postEscFactor = Math.pow(1 + esc, elapsed);
          rrBaseRent[yr] += sf * t.rentPSF * postEscFactor;
          rrCAM[yr] += sf * (t.camPSF || 0) * postEscFactor;
        }
      }
    });
  }

  const years = [];
  let loanBal = loan;
  for (let yr = 1; yr <= hold + 1; yr++) {
    let noi, baseRent = 0, cam = 0, vacancyLoss = 0, freeRentLoss = 0, tiCost = 0, lcCost = 0;
    if (p.useRentRoll && tenants.length > 0) {
      baseRent = rrBaseRent[yr];
      cam = rrCAM[yr];
      const grossRev = baseRent + cam;
      if (grossRev > 0) {
        // Rent roll has actual revenue data
        vacancyLoss = rrVacancyLoss[yr] + grossRev * ((p.vacancy || 0) / 100);
        freeRentLoss = rrFreeRent[yr];
        const egr = grossRev - vacancyLoss - freeRentLoss;
        noi = egr;
        tiCost = rrTI[yr] + rrLC[yr];
      } else {
        // Tenants exist but have no rent data — fall back to year1NOI
        noi = (p.year1NOI || 0) * Math.pow(1 + (p.rentGrowth || 0) / 100, yr - 1) * (1 - (p.vacancy || 0) / 100);
      }
    } else {
      noi = (p.year1NOI || 0) * Math.pow(1 + (p.rentGrowth || 0) / 100, yr - 1) * (1 - (p.vacancy || 0) / 100);
    }
    const useIO = p.isIO && yr <= (p.ioPeriod || 2);
    const annDS = yr <= hold ? (useIO ? dsIO : dsAmort) : 0;
    const intPaid = loanBal * ((p.rate || 6.25) / 100);
    const prinPaid = useIO ? 0 : Math.max(0, (yr <= hold ? annDS : 0) - intPaid);
    if (yr <= hold) loanBal = Math.max(0, loanBal - prinPaid);
    const capexRes = yr <= hold ? (p.useCapexPct ? noi * ((p.capexReservePct || 2) / 100) : (p.capexReserveFlat || 0)) : 0;
    const specCapex = yr <= hold ? capItems.filter(c => c.year === yr).reduce((s, c) => s + (c.amount || 0), 0) : 0;
    const tiLC = yr <= hold ? (p.useRentRoll ? tiCost : ((p.tiReserve || 0) + noi * ((p.lcReservePct || 0) / 100))) : 0;
    const vaInc = yr <= hold ? events.filter(e => e.year === yr && e.type === "income").reduce((s, e) => s + (e.amount || 0), 0) : 0;
    const vaCost = yr <= hold ? events.filter(e => e.year === yr && e.type === "cost").reduce((s, e) => s + (e.amount || 0), 0) : 0;
    const levCF = noi - annDS - capexRes - specCapex - tiLC + vaInc - vaCost;
    years.push({ yr, noi, baseRent, cam, vacancyLoss, freeRentLoss, annDS, levCF, loanBal, useIO, capexRes, specCapex, tiLC, vaInc, vaCost, intPaid, prinPaid });
  }

  // Exit Year NOI comes from the hold+1 year (already computed in loop)
  const holdYears = years.filter(y => y.yr <= hold);
  const exitYr = years.find(y => y.yr === hold + 1);
  const exitNOI = exitYr ? exitYr.noi : (holdYears[holdYears.length - 1]?.noi || 0) * (1 + (p.rentGrowth || 0) / 100);
  const exitVal = exitNOI / ((p.exitCap || 6) / 100);
  const exitBal = holdYears[holdYears.length - 1]?.loanBal || 0;
  const prepayAmt = exitBal * ((p.prepayPct || 1) / 100);
  const saleNet = exitVal - exitBal - prepayAmt;
  const yr1ModelNOI = years[0]?.noi || 0;
  const goingCap = pp > 0 ? yr1ModelNOI / pp * 100 : 0;
  const yoc = totalCost > 0 ? yr1ModelNOI / totalCost * 100 : 0;

  // IRR cash flows — use hold period years only
  const opCFs = holdYears.map(y => y.levCF);
  const levCFsForIRR = [-equity, ...opCFs.slice(0, -1), (opCFs[opCFs.length - 1] || 0) + saleNet];
  const unlevCFsForIRR = [-totalCost, ...holdYears.slice(0, -1).map(y => y.noi), (holdYears[holdYears.length - 1]?.noi || 0) + exitVal];

  const levIRR = calcIRRv2(levCFsForIRR);
  const unlevIRR = calcIRRv2(unlevCFsForIRR);
  const totalReturn = levCFsForIRR.slice(1).reduce((s, v) => s + v, 0);
  const em = equity > 0 ? totalReturn / equity : 0;
  const dscr = holdYears[0] ? holdYears[0].noi / Math.max(holdYears[0].annDS, 1) : 0;
  const avgCoC = equity > 0 ? opCFs.reduce((s, v) => s + v, 0) / holdYears.length / equity * 100 : 0;

  // Waterfall with configurable LP/GP split
  const lpEq = equity * lpPct, gpEq = equity * gpPct;
  let pool = totalReturn;
  let lpOut = 0, gpOut = 0;
  const lpROC = Math.min(pool * lpPct, lpEq); pool -= lpROC;
  const gpROC = Math.min(pool * (gpPct / (lpPct + gpPct) || gpPct), gpEq); pool -= gpROC;
  lpOut += lpROC; gpOut += gpROC;
  const lpPrefTotal = lpEq * pref * hold;
  const gpPrefTotal = gpEq * pref * hold;
  const lpPrefPaid = Math.min(pool * lpPct, lpPrefTotal); pool -= lpPrefPaid;
  const gpPrefPaid = Math.min(pool, gpPrefTotal); pool = Math.max(0, pool - gpPrefPaid);
  lpOut += lpPrefPaid; gpOut += gpPrefPaid;
  // Tiered promote using deal-tab hurdle settings (synced from p)
  const t2LP = (p.hurdleTier2LP ?? wf.tier1Split ?? 80) / 100;
  const t3LP = (p.hurdleTier3LP ?? wf.tier2Split ?? 70) / 100;
  if (wf.catchUp && pool > 0) { const cu = Math.min(pool, gpPrefTotal * 0.5); gpOut += cu; pool -= cu; }
  if (pool > 0) { const t1Amt = Math.min(pool, equity * ((p.hurdleTier2 ?? wf.tier1Thresh ?? 15) / 100) * hold * 0.25); lpOut += t1Amt * t2LP; gpOut += t1Amt * (1 - t2LP); pool -= t1Amt; }
  if (pool > 0) { const t2Amt = Math.min(pool, equity * ((p.hurdleTier3 ?? wf.tier2Thresh ?? 25) / 100) * hold * 0.15); lpOut += t2Amt * t3LP; gpOut += t2Amt * (1 - t3LP); pool -= t2Amt; }
  if (pool > 0) { lpOut += pool * t3LP; gpOut += pool * (1 - t3LP); }

  const lpOpShare = opCFs.map(cf => cf * lpPct);
  const gpOpShare = opCFs.map(cf => cf * gpPct);
  const lpTerminal = lpOut - lpOpShare.reduce((s, v) => s + v, 0);
  const gpTerminal = gpOut - gpOpShare.reduce((s, v) => s + v, 0);
  const lpCFs = [-lpEq, ...lpOpShare.slice(0, -1), (lpOpShare[lpOpShare.length - 1] || 0) + Math.max(0, lpTerminal)];
  const gpCFs = [-gpEq, ...gpOpShare.slice(0, -1), (gpOpShare[gpOpShare.length - 1] || 0) + Math.max(0, gpTerminal)];
  const lpIRR = calcIRRv2(lpCFs);
  const gpIRR = calcIRRv2(gpCFs);
  const lpEM = lpEq > 0 ? lpOut / lpEq : 0;
  const gpPromote = Math.max(0, gpOut - gpEq);
  const goGreen = (levIRR || 0) >= (p.hurdleTier1 || p.hurdleIRR || 9) && em >= (p.hurdleEM || 1.5);

  return {
    pp, totalCost, loan, equity, origFee, acqCost,
    years, holdYears, exitNOI, exitVal, exitBal, saleNet, prepayAmt,
    goingCap, yoc, levIRR, unlevIRR, em, dscr, avgCoC,
    levCFsForIRR, totalReturn,
    lpEq, gpEq, lpOut, gpOut, lpIRR, gpIRR, lpEM, gpPromote,
    goGreen
  };
};
