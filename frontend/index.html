// Main DashboardV2View Component
const DashboardV2View = ({ deal: initialDeal, onBack }) => {
  const { useState, useEffect, useCallback, useMemo, useRef } = React;

  // State
  const [p, setP] = useState(V2_DEFAULTS);
  const [tab, setTab] = useState('deal');
  const [tenants, setTenants] = useState([]);
  const [events, setEvents] = useState([]);
  const [capItems, setCapItems] = useState([]);
  const [wf, setWf] = useState(V2_WF_DEFAULTS);
  const [compared, setCompared] = useState([]);
  const [compLoading, setCompLoading] = useState(false);
  const [hlF, setHlF] = useState([]);
  const [omSt, setOmSt] = useState('idle');
  const [omMsg, setOmMsg] = useState('');
  const [dbtSt, setDbtSt] = useState('idle');
  const [dbtMsg, setDbtMsg] = useState('');
  const [sensM, setSensM] = useState('irr');
  const [cfPeriod, setCfPeriod] = useState('annual');
  const [saveStatus, setSaveStatus] = useState('saved');
  const [rrUpSt, setRrUpSt] = useState('idle'); // idle | loading | success | error
  const [rrUpMsg, setRrUpMsg] = useState('');
  const rrFileRef = useRef(null);

  // Hydrate on mount — pull from saved v2_state first, then fall back to parsed OM data
  useEffect(() => {
    if (initialDeal.v2_state) {
      setP(initialDeal.v2_state.assumptions || V2_DEFAULTS);
      setWf(initialDeal.v2_state.waterfall || V2_WF_DEFAULTS);
      setTenants(initialDeal.v2_state.tenants || []);
      setEvents(initialDeal.v2_state.valueAddEvents || []);
      setCapItems(initialDeal.v2_state.capexItems || []);
    } else if (initialDeal.parsed_data) {
      // Fresh upload — seed V2 assumptions from the parsed OM data
      const pd = initialDeal.parsed_data;
      const prop = pd.property || {};
      const fin = pd.financials || {};
      const assum = pd.assumptions || {};
      const rawPrice = prop.asking_price || fin.asking_price || 0;
      const noi = fin.noi || 0;
      const capRate = fin.cap_rate ? (fin.cap_rate > 1 ? fin.cap_rate : fin.cap_rate * 100) : 0;
      const totalSF = prop.total_sf || fin.total_sf || 0;
      const purchasePrice = rawPrice > 0 ? rawPrice : (noi > 0 && capRate > 0 ? Math.round(noi / (capRate / 100)) : V2_DEFAULTS.purchasePrice);
      const address = prop.address ? `${prop.address || ''}${prop.city ? ', ' + prop.city : ''}${prop.state ? ' ' + prop.state : ''}`.trim() : '';

      const hl = [];
      const seeded = { ...V2_DEFAULTS };
      if (prop.name) { seeded.name = prop.name; hl.push('name'); }
      if (address) { seeded.address = address; hl.push('address'); }
      if (prop.property_type) { seeded.assetType = prop.property_type; hl.push('assetType'); }
      if (totalSF > 0) { seeded.sf = totalSF; hl.push('sf'); }
      if (purchasePrice > 0) { seeded.purchasePrice = purchasePrice; hl.push('purchasePrice'); }
      if (noi > 0) {
        seeded.year1NOI = noi;
        seeded.vacancy = 0; // OM NOI is already net of vacancy — don't double-count
        hl.push('year1NOI');
      }
      if (capRate > 0) { seeded.exitCap = capRate; hl.push('exitCap'); }
      // Map parsed assumptions if present
      if (assum.ltv) seeded.ltv = assum.ltv > 1 ? assum.ltv : assum.ltv * 100;
      if (assum.interest_rate) seeded.rate = assum.interest_rate > 1 ? assum.interest_rate : assum.interest_rate * 100;
      if (assum.hold_period) seeded.holdPeriod = assum.hold_period;
      if (assum.amortization_years) seeded.amort = assum.amortization_years;
      if (assum.exit_cap_rate) seeded.exitCap = assum.exit_cap_rate > 1 ? assum.exit_cap_rate : assum.exit_cap_rate * 100;
      if (assum.noi_growth) seeded.rentGrowth = assum.noi_growth > 1 ? assum.noi_growth : assum.noi_growth * 100;

      setP(seeded);
      setHlF(hl);

      // Seed rent roll if parsed
      if (pd.rent_roll && pd.rent_roll.length > 0) {
        const mappedTenants = pd.rent_roll.map((r, i) => ({
          id: i + 1,
          name: r.tenant || r.name || `Tenant ${i + 1}`,
          suite: r.unit || r.suite || '',
          sf: r.sf || 0,
          rentPSF: r.rent_psf || (r.annual_rent && r.sf ? r.annual_rent / r.sf : 0),
          camPSF: r.cam_psf || (r.cam_annual && r.sf ? r.cam_annual / r.sf : 0),
          type: 'NNN',
          escalPct: 3,
          start: r.lease_start || r.start || '',
          end: r.lease_end || r.expiry || r.end || '',
          tiPSF: 0,
          lcPct: 5,
          recoveryRatio: 100,
        }));
        setTenants(mappedTenants);
        if (mappedTenants.length > 0) {
          setP(prev => ({ ...prev, useRentRoll: true }));
        }
      }
    }
  }, []);

  // Rent roll Excel upload handler
  const handleRRUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setRrUpSt('loading');
    setRrUpMsg('Parsing rent roll...');
    const fd = new FormData();
    fd.append('excel_file', file);
    try {
      const res = await fetch(`${API_URL}/api/v1/deals/parse-rent-roll`, { method: 'POST', body: fd });
      if (res.ok) {
        const data = await res.json();
        if (data.tenants && data.tenants.length > 0) {
          setTenants(data.tenants);
          setP(prev => ({ ...prev, useRentRoll: true, vacancy: 0 }));
          setRrUpMsg(`Loaded ${data.count} tenants from Excel`);
          setRrUpSt('success');
        } else {
          setRrUpMsg('No tenant data found in file');
          setRrUpSt('error');
        }
      } else {
        const err = await res.json().catch(() => ({}));
        setRrUpMsg(err.detail || 'Upload failed');
        setRrUpSt('error');
      }
    } catch (err) {
      setRrUpMsg('Upload failed: ' + err.message);
      setRrUpSt('error');
    }
    // Reset file input so same file can be re-uploaded
    if (rrFileRef.current) rrFileRef.current.value = '';
  };

  // Auto-save
  useEffect(() => {
    setSaveStatus('saving');
    const timer = setTimeout(async () => {
      try {
        await fetch(`${API_URL}/api/v1/deals/${initialDeal.id}/v2-state`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assumptions: p, waterfall: wf, tenants, valueAddEvents: events, capexItems: capItems }),
        });
        setSaveStatus('saved');
      } catch {
        setSaveStatus('error');
      }
    }, 2000);
    return () => clearTimeout(timer);
  }, [p, wf, tenants, events, capItems]);

  // Compute model
  const calc = useMemo(() => runModelV2(p, tenants, events, capItems, wf), [p, tenants, events, capItems, wf]);

  // Load saved deals for Compare tab
  useEffect(() => {
    if (tab !== 'compare' || compared.length > 0 || compLoading) return;
    let cancelled = false;
    const load = async () => {
      setCompLoading(true);
      try {
        const listRes = await fetch(`${API_URL}/api/v1/deals`);
        if (!listRes.ok) { setCompLoading(false); return; }
        const allDeals = await listRes.json();
        // Fetch up to 10 deals (excluding current), most recent first
        const others = allDeals.filter(d => String(d.id) !== String(initialDeal.id)).slice(0, 10);
        const results = [];
        for (const stub of others) {
          if (cancelled) return;
          try {
            const detRes = await fetch(`${API_URL}/api/v1/deals/${stub.id}`);
            if (!detRes.ok) continue;
            const apiDeal = await detRes.json();
            // Build assumptions + tenants from v2_state or parsed_data, then run model
            let dP = { ...V2_DEFAULTS };
            let dTenants = [];
            let dEvents = [];
            let dCapItems = [];
            let dWf = { ...V2_WF_DEFAULTS };
            if (apiDeal.v2_state) {
              dP = { ...V2_DEFAULTS, ...(apiDeal.v2_state.assumptions || {}) };
              dTenants = apiDeal.v2_state.tenants || [];
              dEvents = apiDeal.v2_state.valueAddEvents || [];
              dCapItems = apiDeal.v2_state.capexItems || [];
              dWf = { ...V2_WF_DEFAULTS, ...(apiDeal.v2_state.waterfall || {}) };
            } else if (apiDeal.parsed_data) {
              const pd = apiDeal.parsed_data;
              const prop = pd.property || {};
              const fin = pd.financials || {};
              const rawPrice = prop.asking_price || fin.asking_price || 0;
              const noi = fin.noi || 0;
              const sf = prop.total_sf || fin.total_sf || 0;
              dP = {
                ...V2_DEFAULTS,
                name: prop.name || apiDeal.name || 'Untitled',
                purchasePrice: rawPrice > 0 ? rawPrice : (noi > 0 ? Math.round(noi / 0.07) : 0),
                year1NOI: noi,
                sf: sf || V2_DEFAULTS.sf,
              };
              if (pd.rent_roll && pd.rent_roll.length > 0) {
                dP.useRentRoll = true;
                dTenants = pd.rent_roll.map((r, i) => ({
                  id: i + 1, name: r.tenant || '', suite: r.unit || '', sf: r.sf || 0,
                  rentPSF: r.rent_psf || 0, camPSF: r.cam_psf || 0, type: 'NNN',
                  escalPct: 3, start: r.lease_start || '', end: r.lease_end || '',
                  tiPSF: 0, lcPct: 5, recoveryRatio: 100,
                }));
              }
            }
            const dCalc = runModelV2(dP, dTenants, dEvents, dCapItems, dWf);
            results.push({
              name: dP.name || apiDeal.name || stub.name || 'Untitled',
              id: stub.id,
              calc: dCalc,
            });
          } catch (e) { console.warn('Compare fetch failed for', stub.id, e); }
        }
        if (!cancelled) {
          // Also include current deal
          results.unshift({ name: p.name || initialDeal.property_name || 'Current Deal', id: initialDeal.id, calc, isCurrent: true });
          setCompared(results);
        }
      } catch (e) { console.error('Compare load error:', e); }
      if (!cancelled) setCompLoading(false);
    };
    load();
    return () => { cancelled = true; };
  }, [tab]);

  // OM extraction
  const handleOM = async (file) => {
    setOmSt('loading');
    setOmMsg('Extracting deal data...');
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch(`${API_URL}/api/v1/deals/extract-om`, { method: 'POST', body: fd });
      if (res.ok) {
        const obj = await res.json();
        const hl = [];
        if (obj.purchasePrice) { setP(prev => ({ ...prev, purchasePrice: obj.purchasePrice })); hl.push('purchasePrice'); }
        if (obj.propertyName) { setP(prev => ({ ...prev, name: obj.propertyName })); hl.push('name'); }
        if (obj.address) { setP(prev => ({ ...prev, address: obj.address })); hl.push('address'); }
        if (obj.squareFeet) { setP(prev => ({ ...prev, sf: obj.squareFeet })); hl.push('sf'); }
        if (obj.year1NOI) { setP(prev => ({ ...prev, year1NOI: obj.year1NOI, vacancy: 0 })); hl.push('year1NOI'); }
        setHlF(hl);
        setOmMsg('Extraction complete! Fields highlighted.');
        setOmSt('success');
      }
    } catch (e) {
      setOmMsg('Extraction failed: ' + e.message);
      setOmSt('error');
    }
  };

  // Charts refs
  const cfChartRef = useRef(null), eqChartRef = useRef(null), loanChartRef = useRef(null), hurChartRef = useRef(null);
  const chartInstances = useRef({});

  // Initialize charts on calc change (charts tab)
  useEffect(() => {
    if (tab !== 'charts' || calc.years.length === 0 || !window.Chart) return;
    // Use rAF to guarantee canvas is laid out before Chart.js reads dimensions
    const raf = requestAnimationFrame(() => {
      const hold = calc.holdYears || calc.years;
      const labels = hold.map(y => `Y${y.yr}`);
      const mkChart = (ref, key, cfg) => {
        if (!ref.current) return;
        if (chartInstances.current[key]) chartInstances.current[key].destroy();
        chartInstances.current[key] = new window.Chart(ref.current.getContext('2d'), cfg);
      };
      // 1) NOI vs Debt Service vs Net CF (bar)
      mkChart(cfChartRef, 'cf', {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'NOI ($M)', data: hold.map(y => y.noi / 1e6), backgroundColor: '#00BFA5' },
            { label: 'Debt Service ($M)', data: hold.map(y => -y.annDS / 1e6), backgroundColor: '#F87171' },
            { label: 'Net CF ($M)', data: hold.map(y => y.levCF / 1e6), backgroundColor: '#34D399' },
          ],
        },
        options: { responsive: true, plugins: { legend: { labels: { color: 'var(--text-secondary)' } } },
          scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v.toFixed(1) + 'M' } }, x: { ticks: { color: '#94A3B8' } } } },
      });
      // 2) Loan Balance Paydown (line)
      mkChart(loanChartRef, 'loan', {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Loan Balance ($M)',
            data: hold.map(y => y.loanBal / 1e6),
            borderColor: '#4A8FD4', backgroundColor: 'rgba(74,143,212,0.1)', tension: 0.3, fill: true,
          }],
        },
        options: { responsive: true, plugins: { legend: { labels: { color: 'var(--text-secondary)' } } },
          scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v.toFixed(1) + 'M' } }, x: { ticks: { color: '#94A3B8' } } } },
      });
      // 3) Equity Build / Cumulative CF (line + bar)
      mkChart(eqChartRef, 'eq', {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Annual CF ($M)', data: hold.map(y => y.levCF / 1e6), backgroundColor: 'rgba(52,211,153,0.6)', order: 2 },
            { label: 'Cumulative ($M)', data: hold.reduce((acc, y) => { const prev = acc.length ? acc[acc.length - 1] : 0; acc.push(prev + y.levCF / 1e6); return acc; }, []),
              type: 'line', borderColor: '#A78BFA', backgroundColor: 'transparent', tension: 0.3, order: 1 },
          ],
        },
        options: { responsive: true, plugins: { legend: { labels: { color: 'var(--text-secondary)' } } },
          scales: { y: { ticks: { callback: v => '$' + v.toFixed(1) + 'M' } }, x: { ticks: { color: '#94A3B8' } } } },
      });
      // 4) Returns Snapshot (horizontal bar)
      mkChart(hurChartRef, 'hur', {
        type: 'bar',
        data: {
          labels: ['Levered IRR', 'Unlev IRR', 'Going-in Cap', 'YoC', 'Avg CoC'],
          datasets: [{
            label: 'Return (%)',
            data: [calc.levIRR || 0, calc.unlevIRR || 0, (calc.goingCap || 0) * 100, (calc.yoc || 0) * 100, (calc.avgCoC || 0) * 100],
            backgroundColor: ['#00BFA5', '#34D399', '#4A8FD4', '#A78BFA', '#F59E0B'],
          }],
        },
        options: { indexAxis: 'y', responsive: true,
          plugins: { legend: { display: false } },
          scales: { x: { ticks: { callback: v => v.toFixed(1) + '%' } }, y: { ticks: { color: '#94A3B8' } } } },
      });
    });
    return () => cancelAnimationFrame(raf);
  }, [tab, calc]);

  return (
    <div style={{
      backgroundColor: 'var(--bg)',
      color: 'var(--text-primary)',
      fontFamily: "'DM Sans', system-ui, sans-serif",
      minHeight: '100vh',
      paddingBottom: '40px',
    }}>
      {/* Header */}
      <div style={{
        position: 'sticky',
        top: 0,
        backgroundColor: 'rgba(15, 34, 54, 0.95)',
        backdropFilter: 'blur(10px)',
        borderBottom: '1px solid var(--border)',
        padding: '16px 24px',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
        zIndex: 100,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
          <button onClick={onBack} style={{
            background: 'none',
            border: 'none',
            color: 'var(--slate)',
            cursor: 'pointer',
            fontSize: '20px',
          }}>←</button>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <img src={CRELYTIC_ICON_B64} alt="" style={{ height: '22px', opacity: 0.85 }} />
              <span style={{
                fontSize: '16px',
                fontWeight: '700',
                fontFamily: "'DM Sans', system-ui, sans-serif",
                color: 'var(--text-primary)',
                letterSpacing: '-0.3px',
              }}>Deal Analyzer</span>
            </div>
            <div style={{
              fontSize: '12px',
              color: 'var(--slate)',
              marginTop: '2px',
            }}>{p.name}</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
          <div style={{
            fontSize: '11px',
            padding: '4px 8px',
            borderRadius: '4px',
            backgroundColor: saveStatus === 'saved' ? 'rgba(52, 211, 153, 0.2)' : saveStatus === 'saving' ? 'rgba(251, 191, 36, 0.2)' : 'rgba(248, 113, 113, 0.2)',
            color: saveStatus === 'saved' ? 'var(--green)' : saveStatus === 'saving' ? 'var(--amber)' : 'var(--red)',
          }}>
            {saveStatus === 'saved' ? '✓ Saved' : saveStatus === 'saving' ? 'Saving...' : 'Error'}
          </div>
          <div style={{
            padding: '6px 12px',
            borderRadius: '4px',
            backgroundColor: calc.goGreen ? 'rgba(52, 211, 153, 0.2)' : 'rgba(248, 113, 113, 0.2)',
            color: calc.goGreen ? 'var(--green)' : 'var(--red)',
            fontSize: '12px',
            fontWeight: '600',
          }}>
            {calc.goGreen ? 'GO' : 'NO-GO'}
          </div>
          <button onClick={() => printMemoV2(initialDeal, calc)} style={{
            backgroundColor: 'var(--blue)',
            border: 'none',
            color: '#fff',
            padding: '8px 12px',
            borderRadius: '4px',
            cursor: 'pointer',
            fontSize: '12px',
            fontWeight: '600',
          }}>
            Print Memo
          </button>
          <button onClick={() => exportV2Excel(initialDeal, calc, p, wf, tenants, events, capItems)} style={{
            backgroundColor: 'var(--teal)',
            border: 'none',
            color: '#fff',
            padding: '8px 12px',
            borderRadius: '4px',
            cursor: 'pointer',
            fontSize: '12px',
            fontWeight: '600',
          }}>
            Export
          </button>
        </div>
      </div>

      {/* Tab Bar */}
      <div style={{
        borderBottom: '1px solid var(--border)',
        display: 'flex',
        overflowX: 'auto',
        paddingLeft: '24px',
        gap: '8px',
        backgroundColor: 'var(--bg)',
      }}>
        <V2TabBtn label="Upload" active={tab === 'upload'} onClick={() => setTab('upload')} />
        <V2TabBtn label="Deal" active={tab === 'deal'} onClick={() => setTab('deal')} />
        <V2TabBtn label="Debt" active={tab === 'debt'} onClick={() => setTab('debt')} />
        <V2TabBtn label="Rent Roll" active={tab === 'rentroll'} onClick={() => setTab('rentroll')} badge={tenants.length} />
        <V2TabBtn label="Value-Add" active={tab === 'valueadd'} onClick={() => setTab('valueadd')} badge={events.length + capItems.length} />
        <V2TabBtn label="Cash Flows" active={tab === 'cashflows'} onClick={() => setTab('cashflows')} />
        <V2TabBtn label="Sensitivity" active={tab === 'sensitivity'} onClick={() => setTab('sensitivity')} />
        <V2TabBtn label="Charts" active={tab === 'charts'} onClick={() => setTab('charts')} />
        <V2TabBtn label="Waterfall" active={tab === 'waterfall'} onClick={() => setTab('waterfall')} />
        <V2TabBtn label="Compare" active={tab === 'compare'} onClick={() => setTab('compare')} />
      </div>

      {/* Tab Content */}
      <div style={{ maxWidth: '1400px', margin: '0 auto', padding: '24px' }}>

        {/* UPLOAD TAB */}
        {tab === 'upload' && (
          <div>
            <V2Sect title="Operating Memorandum">
              <div style={{
                border: '2px dashed var(--border)',
                borderRadius: '8px',
                padding: '32px',
                textAlign: 'center',
                backgroundColor: 'var(--surface)',
                cursor: 'pointer',
              }}
              onDragOver={(e) => e.preventDefault()}
              onDrop={(e) => {
                e.preventDefault();
                if (e.dataTransfer.files[0]) handleOM(e.dataTransfer.files[0]);
              }}>
                <div style={{ fontSize: '24px', marginBottom: '8px' }}>📄</div>
                <div style={{ fontSize: '14px', color: 'var(--text-primary)', marginBottom: '4px' }}>
                  Drop OM PDF or image here
                </div>
                <div style={{ fontSize: '12px', color: 'var(--text-secondary)' }}>
                  Supported: PDF, PNG, JPG
                </div>
                <input
                  type="file"
                  accept=".pdf,.png,.jpg,.jpeg"
                  onChange={(e) => e.target.files[0] && handleOM(e.target.files[0])}
                  style={{ marginTop: '16px', display: 'none' }}
                />
              </div>
              {omSt === 'loading' && <div style={{ marginTop: '16px', color: 'var(--blue)' }}>🔄 {omMsg}</div>}
              {omSt === 'success' && (
                <div style={{ marginTop: '16px', padding: '12px', backgroundColor: 'rgba(52, 211, 153, 0.1)', borderRadius: '4px', color: 'var(--green)' }}>
                  ✓ {omMsg}
                </div>
              )}
              {omSt === 'error' && <div style={{ marginTop: '16px', color: 'var(--red)' }}>✕ {omMsg}</div>}
            </V2Sect>
            <button onClick={() => setTab('deal')} style={{
              backgroundColor: 'var(--blue)',
              border: 'none',
              color: '#fff',
              padding: '12px 24px',
              borderRadius: '6px',
              cursor: 'pointer',
              fontSize: '14px',
              fontWeight: '600',
            }}>
              Review Deal →
            </button>
          </div>
        )}

        {/* DEAL TAB */}
        {tab === 'deal' && (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '24px' }}>
            {/* Col 1: Property & Income */}
            <div>
              <V2Sect title="Property">
                <V2Inp
                  label="Name"
                  value={p.name}
                  onChange={(v) => setP(prev => ({ ...prev, name: v }))}
                  hl={hlF.includes('name')}
                />
                <div style={{ marginBottom: '12px' }}>
                  <label style={{
                    display: 'block',
                    fontSize: '11px',
                    fontWeight: '600',
                    color: 'var(--text-secondary)',
                    textTransform: 'uppercase',
                    marginBottom: '6px',
                  }}>Asset Type</label>
                  <select value={p.assetType} onChange={(e) => setP(prev => ({ ...prev, assetType: e.target.value }))} style={{
                    width: '100%',
                    backgroundColor: 'var(--surface)',
                    border: '1px solid var(--border)',
                    borderRadius: '6px',
                    padding: '8px 10px',
                    color: 'var(--text-primary)',
                    fontSize: '13px',
                  }}>
                    <option>Office</option>
                    <option>Retail</option>
                    <option>Industrial</option>
                    <option>Multifamily</option>
                    <option>Mixed-Use</option>
                  </select>
                </div>
                <V2Inp
                  label="Address"
                  value={p.address}
                  onChange={(v) => setP(prev => ({ ...prev, address: v }))}
                  hl={hlF.includes('address')}
                />
                <V2Inp
                  label="Square Footage"
                  type="number"
                  value={p.sf}
                  onChange={(v) => setP(prev => ({ ...prev, sf: parseFloat(v) || 0 }))}
                  suffix="SF"
                  hl={hlF.includes('sf')}
                />
              </V2Sect>

              <V2Sect title="Acquisition">
                <V2Inp
                  label="Purchase Price"
                  type="number"
                  value={p.purchasePrice}
                  onChange={(v) => setP(prev => ({ ...prev, purchasePrice: parseFloat(v) || 0 }))}
                  prefix="$"
                  hl={hlF.includes('purchasePrice')}
                />
                <V2Inp
                  label="Acq Cost %"
                  type="number"
                  value={p.acqCostPct}
                  onChange={(v) => setP(prev => ({ ...prev, acqCostPct: parseFloat(v) || 0 }))}
                  suffix="%"
                />
                <V2Inp
                  label="Closing Costs"
                  type="number"
                  value={p.closingCosts}
                  onChange={(v) => setP(prev => ({ ...prev, closingCosts: parseFloat(v) || 0 }))}
                  prefix="$"
                />
              </V2Sect>

              <V2Sect title="Income">
                <V2Tog
                  label="Use Rent Roll"
                  value={p.useRentRoll}
                  onChange={(v) => setP(prev => ({ ...prev, useRentRoll: v }))}
                />
                {!p.useRentRoll && (
                  <>
                    <V2Inp
                      label="Year 1 NOI"
                      type="number"
                      value={p.year1NOI}
                      onChange={(v) => setP(prev => ({ ...prev, year1NOI: parseFloat(v) || 0 }))}
                      prefix="$"
                      hl={hlF.includes('year1NOI')}
                    />
                    <V2Inp
                      label="Rent Growth %"
                      type="number"
                      value={p.rentGrowth}
                      onChange={(v) => setP(prev => ({ ...prev, rentGrowth: parseFloat(v) || 0 }))}
                      suffix="%"
                    />
                    <V2Inp
                      label="Vacancy Adj %"
                      type="number"
                      value={p.vacancy}
                      onChange={(v) => setP(prev => ({ ...prev, vacancy: parseFloat(v) || 0 }))}
                      suffix="%"
                      placeholder="0 if NOI is net"
                    />
                  </>
                )}
              </V2Sect>

              {p.useRentRoll && (
              <V2Sect title="Market Leasing Assumptions">
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                  <V2Inp
                    label="Renewal Probability"
                    type="number"
                    value={p.marketRenewalProb ?? 75}
                    onChange={(v) => setP(prev => ({ ...prev, marketRenewalProb: parseFloat(v) || 0 }))}
                    suffix="%"
                  />
                  <V2Inp
                    label="Months Vacant"
                    type="number"
                    value={p.marketVacantMonths ?? 6}
                    onChange={(v) => setP(prev => ({ ...prev, marketVacantMonths: parseInt(v) || 0 }))}
                    suffix="mo"
                  />
                  <V2Inp
                    label="Free Rent (New)"
                    type="number"
                    value={p.marketFreeRentMonths ?? 2}
                    onChange={(v) => setP(prev => ({ ...prev, marketFreeRentMonths: parseInt(v) || 0 }))}
                    suffix="mo"
                  />
                  <V2Inp
                    label="Vacancy Adj %"
                    type="number"
                    value={p.vacancy ?? 0}
                    onChange={(v) => setP(prev => ({ ...prev, vacancy: parseFloat(v) || 0 }))}
                    suffix="%"
                    placeholder="Additional flat adj"
                  />
                </div>
                <div style={{ marginTop: '8px', fontSize: '11px', fontWeight: '600', color: 'var(--text-secondary)', textTransform: 'uppercase', marginBottom: '6px' }}>Tenant Improvements</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                  <V2Inp
                    label="TI New /SF"
                    type="number"
                    value={p.marketTINewPSF ?? 15}
                    onChange={(v) => setP(prev => ({ ...prev, marketTINewPSF: parseFloat(v) || 0 }))}
                    prefix="$"
                  />
                  <V2Inp
                    label="TI Renewal /SF"
                    type="number"

                  // Transform annual data into sub-periods

                  const periodLabel = cfPeriod === 'quarterly' ? 'Q' : cfPeriod === 'monthly' ? 'M' : 'Y';

                  let periods = [];

                    periods = annualYears.map(y => ({ ...y, label: y.yr <= hold ? `Y${y.yr}` : 'Exit Yr', isExit: y.yr > hold }));
                  } else {
                    // Quarterly or Monthly — split each year
                    const holdYears = annualYears.filter(y => y.yr <= hold);
                    holdYears.forEach(y => {
                      for (let sub = 1; sub <= divisor; sub++) {
                        const frac = 1 / divisor;
                        periods.push({
                          ...y,
                          // Divide flow items proportionally
                          baseRent: y.baseRent * frac,
                          cam: y.cam * frac,
                          noi: y.noi * frac,
                          annDS: y.annDS * frac,
                          vacancyLoss: (y.vacancyLoss || 0) * frac,
                          freeRentLoss: (y.freeRentLoss || 0) * frac,
                          capexRes: y.capexRes * frac,
                          specCapex: y.specCapex * frac,
                          tiLC: (y.tiLC || 0) * frac,
                          vaInc: (y.vaInc || 0) * frac,
                          vaCost: (y.vaCost || 0) * frac,
                          levCF: y.levCF * frac,
                          loanBal: y.loanBal, // balance stays the same within a year
                          label: `Y${y.yr} ${periodLabel}${sub}`,
                          isExit: false,
                          _key: `${y.yr}-${sub}`,

                    if (abs >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';

                          {opts.neg ? `(${fmtCell(Math.abs(getter(pd)))})` : fmtCell(getter(pd))}
                        </td>
                      ))}
                    </tr>
                  );
                  return (
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ borderBottom: '2px solid var(--border)' }}>
                      <th style={{ textAlign: 'left', padding: '6px 8px', color: 'var(--text-secondary)', minWidth: '160px', position: 'sticky', left: 0, backgroundColor: 'var(--surface)', zIndex: 2 }}>Item</th>
                      {periods.map((pd, idx) => (

                          {pd.label}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {/* Revenue section */}
                    {hasRR && plRow('Potential Base Rent', y => y.baseRent, { color: 'var(--green)', indent: true })}

                    {hasRR && plRow('Potential Gross Revenue', y => y.baseRent + y.cam, { bold: true, color: 'var(--green)', bg: 'rgba(52, 211, 153, 0.05)' })}
                    {hasRR && periods.some(y => y.vacancyLoss > 0) && plRow('Vacancy Loss', y => y.vacancyLoss, { color: 'var(--red)', indent: true, neg: true })}
                    {hasRR && periods.some(y => (y.freeRentLoss || 0) > 0) && plRow('Free Rent', y => y.freeRentLoss || 0, { color: 'var(--red)', indent: true, neg: true })}
                    {hasRR && plRow('Effective Gross Revenue', y => y.baseRent + y.cam - (y.vacancyLoss || 0) - (y.freeRentLoss || 0), { bold: true, bg: 'rgba(52, 211, 153, 0.08)' })}

                    {/* NOI */}
                    {plRow('Net Operating Income', y => y.noi, { bold: true, color: 'var(--green)', bg: 'rgba(52, 211, 153, 0.1)' })}

                    {/* Below NOI */}
                    {plRow('Debt Service', y => y.annDS, { color: 'var(--red)', indent: true, neg: true })}
                    {plRow('CapEx & Reserves', y => y.capexRes + y.specCapex, { indent: true, neg: true, color: 'var(--slate)' })}
                    {plRow('TI / LC', y => y.tiLC, { indent: true, neg: true, color: 'var(--slate)' })}
                    {periods.some(y => y.vaInc > 0) && plRow('Value-Add Income', y => y.vaInc, { indent: true, color: 'var(--teal)' })}
                    {periods.some(y => y.vaCost > 0) && plRow('Value-Add Cost', y => y.vaCost, { indent: true, neg: true, color: 'var(--red)' })}

                <V2Sld

                  step={5}

                <V2Sld

                  max={100}
                  step={5}

                <V2Card label="GP Equity In" value={fmtM(calc.gpEq)} />

                <V2Card label="GP Total Distribution" value={fmtM(calc.gpTotalDist)} />

        {/* COMPARE TAB */}
        {tab === 'compare' && (
          <div>
            <V2Sect title={`Deal Comparison${compared.length > 0 ? ` (${compared.length} deals)` : ''}`}>

                      <tr style={{ borderBottom: '2px solid var(--border)' }}>

                            borderBottom: d.isCurrent ? '2px solid #00BFA5' : undefined,
                          }}>
                            {d.name}
                            {d.isCurrent && <span style={{ display: 'block', fontSize: '9px', color: '#00BFA5', opacity: 0.8 }}>CURRENT</span>}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        { label: 'Purchase Price', field: 'pp', fmt: fmtM, section: 'Capital' },
                        { label: 'Total Cost', field: 'totalCost', fmt: fmtM },
                        { label: 'Loan Amount', field: 'loan', fmt: fmtM },
                        { label: 'Equity Required', field: 'equity', fmt: fmtM },
                        { label: 'Going-in Cap', field: 'goingCap', fmt: v => fmtP(isN(v) ? v * 100 : v), section: 'Returns' },
                        { label: 'Yield on Cost', field: 'yoc', fmt: v => fmtP(isN(v) ? v * 100 : v) },
                        { label: 'Levered IRR', field: 'levIRR', fmt: fmtP, highlight: true },
                        { label: 'Unlevered IRR', field: 'unlevIRR', fmt: fmtP },
                        { label: 'Equity Multiple', field: 'em', fmt: fmtX, highlight: true },
                        { label: 'Avg Cash-on-Cash', field: 'avgCoC', fmt: v => fmtP(isN(v) ? v * 100 : v) },
                        { label: 'DSCR', field: 'dscr', fmt: fmtX, section: 'Risk' },
                        { label: 'Exit Value', field: 'exitVal', fmt: fmtM, section: 'Exit' },
                        { label: 'Exit NOI', field: 'exitNOI', fmt: fmtM },
                      ].map((m, i) => (
                        <React.Fragment key={i}>
                          {m.section && (
                            <tr><td colSpan={compared.length + 1} style={{ padding: '12px 8px 4px', fontSize: '10px', fontWeight: 700, color: '#00BFA5', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{m.section}</td></tr>
                          )}
                          <tr style={{ borderBottom: '1px solid var(--border)' }}>
                            <td style={{ padding: '8px', color: 'var(--text-secondary)', position: 'sticky', left: 0, backgroundColor: 'var(--surface)', zIndex: 1, fontWeight: m.highlight ? 600 : 400 }}>{m.label}</td>
                            {compared.map((d, j) => {
                              const val = d.calc[m.field];
                              // Find best value among deals for highlighting
                              const allVals = compared.map(c => c.calc[m.field]).filter(v => isN(v));
                              const best = m.field === 'dscr' ? undefined : (allVals.length > 0 ? Math.max(...allVals) : undefined);
                              const isBest = m.highlight && isN(val) && val === best && allVals.length > 1;
                              return (
                                <td key={j} style={{
                                  textAlign: 'right', padding: '8px',
                                  color: isBest ? '#00BFA5' : (d.isCurrent ? 'var(--text-primary)' : 'var(--text-primary)'),
                                  fontWeight: (m.highlight || isBest) ? 600 : 400,
                                }}>
                                  {m.fmt(val)}
                                </td>
                              );
                            })}
                          </tr>
                        </React.Fragment>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {compared.length > 0 && (
                <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                  <button
                    onClick={() => { setCompared([]); setCompLoading(false); }}
                    style={{
                      backgroundColor: 'rgba(248, 113, 113, 0.15)', border: '1px solid var(--red)',
                      color: 'var(--red)', padding: '8px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px',
                    }}
                  >
                    Clear
                  </button>
                  <button
                    onClick={() => { setCompared([]); }}
                    style={{
                      backgroundColor: 'rgba(0, 191, 165, 0.15)', border: '1px solid #00BFA5',
                      color: '#00BFA5', padding: '8px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px',
                    }}
                  >
                    Refresh
                  </button>
                </div>
              )}
            </V2Sect>
          </div>
        )}
      </div>
    </div>
  );
};

        /* ═══════════════════════════════════════════════════════════
         * V1 DASHBOARD — ARCHIVED

         * Kept for reference — do not delete.

        const DashboardView_ARCHIVED = ({ deal: initialDeal, onBack }) => {
            const [deal, setDeal] = useState(initialDeal);
            const [activeTab, setActiveTab] = useState('overview');
            const [uploadingRentRoll, setUploadingRentRoll] = useState(false);
            // Track whether the OM had an explicit asking price (found on page 1)
            const priceWasExtracted = (initialDeal._raw_asking_price || 0) > 0;
            // Editable overrides for parsed values
            const [overrides, setOverrides] = useState({
                asking_price: initialDeal.asking_price || 0,
                noi: initialDeal.noi || 0,
                cap_rate: initialDeal.cap_rate || 0,
                rentable_sf: initialDeal.rentable_sf || 0,
            });
            const [assumptions, setAssumptions] = useState({
                exit_cap_rate: 0.065,
                noi_growth: 0.02,
                hold_period: 5,
                ltv: 0.65,
                interest_rate: 0.045,
                amortization_years: 25,
                interest_only: false,
                io_term: 5,
                ...(initialDeal.assumptions || {}),
            });

            const updateOverride = (key, value) => {
                setOverrides(prev => {
                    const updated = { ...prev, [key]: value };
                    if (key === 'cap_rate' && !priceWasExtracted && updated.noi > 0 && value > 0) {
                        // No extracted price — derive price from NOI / Cap Rate
                        updated.asking_price = Math.round(updated.noi / value);
                    } else if (key === 'noi' && !priceWasExtracted && updated.cap_rate > 0) {
                        // NOI changed and no extracted price — recalculate price
                        updated.asking_price = Math.round(value / updated.cap_rate);
                    } else if ((key === 'asking_price' || key === 'noi') && updated.asking_price > 0) {
                        // Price was extracted or manually set — recalc cap rate
                        updated.cap_rate = updated.noi / updated.asking_price;
                    }
                    return updated;
                });
            };

            const updateAssumption = (key, value) => {
                setAssumptions(prev => ({ ...prev, [key]: value }));
            };

            const handleSliderChange = (key, value) => {
                updateAssumption(key, parseFloat(value));
            };

            const handleRentRollUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadingRentRoll(true);
                try {
                    const formData = new FormData();
                    formData.append('excel_file', file);
                    const res = await fetch(`${API_URL}/api/v1/deals/${deal.id}/rent-roll`, {
                        method: 'POST',
                        body: formData,
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || 'Upload failed');
                    }
                    const updatedApiDeal = await res.json();
                    const updatedDeal = mapApiDealToFlatDeal(updatedApiDeal);
                    setDeal(updatedDeal);
                    alert(`Rent roll attached: ${updatedDeal.rent_roll.length} units loaded`);
                } catch (error) {
                    alert('Error attaching rent roll: ' + error.message);
                } finally {
                    setUploadingRentRoll(false);
                    e.target.value = '';
                }
            };

            // Calculate key metrics from editable overrides
            const askingPrice = overrides.asking_price || 0;
            const noi = overrides.noi || 0;
            const capRate = overrides.cap_rate || 0;
            const rentableSF = overrides.rentable_sf || 1;
            const equity = askingPrice * (1 - assumptions.ltv);
            const debt = askingPrice * assumptions.ltv;
            const ds = debt > 0
                ? (assumptions.interest_only ? annualDebtServiceIO(debt, assumptions.interest_rate) : annualDebtService(debt, assumptions.interest_rate, assumptions.amortization_years))
                : 0;
            const dscr = ds > 0 ? noi / ds : 0;
            const cashOnCash = equity > 0 ? (noi - ds) / equity : 0;
            const pricePerSF = rentableSF > 0 ? askingPrice / rentableSF : 0;

            // Build a merged deal object for child components
            const effectiveDeal = { ...deal, asking_price: askingPrice, noi, cap_rate: capRate, rentable_sf: overrides.rentable_sf };

            return (
                <div className="container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>

                            ← Back to Deals
                        </button>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <label style={{
                                display: 'inline-flex', alignItems: 'center', gap: '0.5rem',
                                padding: '0.4rem 1rem', borderRadius: '6px', fontSize: '0.8rem', fontWeight: 600,
                                background: 'var(--green)', color: 'white', cursor: uploadingRentRoll ? 'wait' : 'pointer',
                                opacity: uploadingRentRoll ? 0.6 : 1,
                            }}>
                                📎 {uploadingRentRoll ? 'Uploading...' : 'Attach Rent Roll (Excel)'}
                                <input type="file" accept=".xlsx,.xls,.csv" onChange={handleRentRollUpload}
                                    disabled={uploadingRentRoll} style={{ display: 'none' }} />
                            </label>
                            <button
                                onClick={() => exportDealToExcel(deal, overrides, assumptions)}
                                style={{
                                    display: 'inline-flex', alignItems: 'center', gap: '0.5rem',
                                    padding: '0.4rem 1rem', borderRadius: '6px', fontSize: '0.8rem', fontWeight: 600,
                                    background: 'var(--blue)', color: 'white', border: 'none', cursor: 'pointer',
                                }}
                            >
                                📊 Export to Excel
                            </button>
                        </div>
                    </div>

                    <div className="property-header">
                        <div className="property-title" onClick={() => {
                            const newName = prompt('Edit property name:', deal.property_name);
                            if (newName && newName.trim()) setDeal(prev => ({ ...prev, property_name: newName.trim() }));
                        }} style={{ cursor: 'pointer', borderBottom: '1px dashed var(--blue)' }}
                            title="Click to edit name">
                            {deal.property_name} {deal.source === 'argus' && <span style={{ fontSize: '0.6rem', background: 'rgba(0,191,165,0.15)', color: '#00BFA5', padding: '2px 6px', borderRadius: '4px', fontWeight: 600, marginLeft: '8px', verticalAlign: 'middle' }}>ARGUS</span>} <span style={{ fontSize: '0.7rem', color: 'var(--blue)' }}>✎</span>
                        </div>
                        <div className="property-details">
                            <div className="property-detail">
                                <div className="property-detail-label">Address <span style={{ fontSize: '0.6rem', color: 'var(--blue)' }}>✎</span></div>
                                <div className="property-detail-value" onClick={() => {
                                    const newAddr = prompt('Edit address:', deal.address);
                                    if (newAddr && newAddr.trim()) setDeal(prev => ({ ...prev, address: newAddr.trim() }));
                                }} style={{ cursor: 'pointer', borderBottom: '1px dashed var(--blue)' }}
                                    title="Click to edit">{deal.address}</div>
                            </div>
                            <div className="property-detail">
                                <div className="property-detail-label">Property Type <span style={{ fontSize: '0.6rem', color: 'var(--blue)' }}>✎</span></div>
                                <div className="property-detail-value" onClick={() => {
                                    const newType = prompt('Edit property type:', deal.property_type);
                                    if (newType && newType.trim()) setDeal(prev => ({ ...prev, property_type: newType.trim() }));
                                }} style={{ cursor: 'pointer', borderBottom: '1px dashed var(--blue)' }}
                                    title="Click to edit">{deal.property_type}</div>
                            </div>
                            <div className="property-detail">
                                <div className="property-detail-label">Rentable SF</div>
                                <div className="property-detail-value">
                                    <EditableValue value={overrides.rentable_sf} format="sf"
                                        onSave={v => updateOverride('rentable_sf', v)} />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="kpi-row">
                        <div className="kpi-card">
                            <div className="kpi-label">Asking Price <span style={{ fontSize: '0.6rem', color: 'var(--blue)' }}>✎</span></div>
                            <div className="kpi-value">
                                <EditableValue value={overrides.asking_price} format="currency"
                                    onSave={v => updateOverride('asking_price', v)} />
                            </div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Cap Rate</div>
                            <div className="kpi-value">{formatPercent(capRate)}</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">NOI <span style={{ fontSize: '0.6rem', color: 'var(--blue)' }}>✎</span></div>
                            <div className="kpi-value">
                                <EditableValue value={overrides.noi} format="currency"
                                    onSave={v => updateOverride('noi', v)} />
                            </div>
                        </div>
                        <KPICard label="$/SF" value={pricePerSF} format="psf" />
                        <KPICard label="Equity Required" value={equity} format="currency" />
                        <KPICard label="DSCR" value={dscr} format="ratio" />
                        <KPICard label="Cash-on-Cash" value={cashOnCash} format="percent" />
                        <KPICard label="LTV" value={assumptions.ltv} format="percent" />
                    </div>

                    {/* Tab Navigation */}
                    <div style={{ display: 'flex', gap: '0', borderBottom: '2px solid var(--border)', marginBottom: '1.5rem' }}>
                        {[
                            { id: 'overview', label: 'Overview' },

                    {activeTab === 'analysis' && (

                    {activeTab === 'overview' && <><div className="dashboard-grid">

                                            <span style={{

                                                <span style={{
                                                    position: 'absolute', height: '20px', width: '20px',
                                                    left: assumptions.interest_only ? '25px' : '3px', bottom: '3px',
                                                    background: '#E8EDF2', borderRadius: '50%', transition: 'left 0.2s',
                                                }}></span>
                                            </span>
                                        </label>
                                    </div>
                                    <div style={{ fontSize: '0.75rem', color: 'var(--slate)', marginTop: '4px' }}>
                                        {assumptions.interest_only ? 'IO — interest payments only, full balloon at exit' : 'Amortizing — principal + interest payments'}
                                    </div>
                                    {assumptions.interest_only && (
                                        <div style={{ display: 'flex', gap: '6px', marginTop: '8px' }}>
                                            {[3, 5, 7, 10].map(term => (

                                                    style={{
                                                        flex: 1, padding: '6px 0', borderRadius: '6px', fontSize: '0.8rem', fontWeight: 600,
                                                        cursor: 'pointer', transition: 'all 0.2s',
                                                        background: (assumptions.io_term || 5) === term ? '#00BFA5' : 'rgba(30,51,71,0.6)',
                                                        color: (assumptions.io_term || 5) === term ? 'white' : 'var(--slate)',
                                                        border: (assumptions.io_term || 5) === term ? '1px solid #00BFA5' : '1px solid var(--border)',
                                                    }}>
                                                    {term}Y
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <ChatWidget dealId={deal.id} />
                    </div>

                    <SensitivityTable asking_price={askingPrice} noi={noi} assumptions={assumptions} />

                    <CashFlowTable
                        noi={noi}
                        asking_price={askingPrice}
                        assumptions={{ ...assumptions, sf: overrides.rentable_sf }}
                        rentable_sf={overrides.rentable_sf}
                    />

                    <IRRMatrix noi={noi} asking_price={askingPrice} assumptions={{ ...assumptions, sf: overrides.rentable_sf }} />

                    <div style={{ marginTop: '3rem' }}>
                        <RentRollTable rentRoll={deal.rent_roll} />
                    </div>
                    </>}
                </div>
            );
        };

        // Error Boundary to prevent blank screens
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="container">
                            <div className="card" style={{ padding: '2rem', textAlign: 'center' }}>
                                <div style={{ fontSize: '3rem', marginBottom: '1rem' }}>⚠️</div>
                                <h2 style={{ color: 'var(--text-primary)', marginBottom: '0.5rem' }}>Dashboard Rendering Error</h2>
                                <p style={{ color: 'var(--text-secondary)', marginBottom: '1rem' }}>
                                    The parsed data may be incomplete or in an unexpected format.
                                </p>
                                <pre style={{ background: 'var(--bg)', padding: '1rem', borderRadius: '8px', fontSize: '0.75rem', textAlign: 'left', overflow: 'auto', marginBottom: '1rem', color: 'var(--red)' }}>
                                    {this.state.error?.message}
                                </pre>
                                <button className="btn btn-secondary" onClick={this.props.onBack}>← Back to Deals</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // Admin Panel — User Management
        const AdminPanel = ({ onBack }) => {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showCreate, setShowCreate] = useState(false);
            const [newUser, setNewUser] = useState({ email: '', password: '', name: '', role: 'analyst' });
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({});
            const [error, setError] = useState('');

            const loadUsers = async () => {
                try {
                    const res = await fetch(`${API_URL}/api/v1/admin/users`);
                    if (!res.ok) throw new Error('Failed to load users');
                    const data = await res.json();
                    setUsers(data);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadUsers(); }, []);

            const handleCreate = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    const res = await fetch(`${API_URL}/api/v1/admin/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newUser),
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || 'Failed to create user');
                    }
                    setNewUser({ email: '', password: '', name: '', role: 'analyst' });
                    setShowCreate(false);
                    await loadUsers();
                } catch (e) {
                    setError(e.message);
                }
            };

            const handleUpdate = async (userId) => {
                setError('');
                try {
                    const payload = { ...editData };
                    if (!payload.password) delete payload.password;
                    const res = await fetch(`${API_URL}/api/v1/admin/users/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.detail || 'Failed to update user');
                    }
                    setEditingId(null);
                    setEditData({});
                    await loadUsers();
                } catch (e) {
                    setError(e.message);
                }
            };

            const handleToggleActive = async (user) => {
                try {
                    const res = await fetch(`${API_URL}/api/v1/admin/users/${user.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_active: !user.is_active }),
                    });
                    if (!res.ok) throw new Error('Failed to update user');
                    await loadUsers();
                } catch (e) {
                    setError(e.message);
                }
            };

            const handleDelete = async (user) => {
                if (!confirm(`Permanently delete ${user.email}? This cannot be undone.`)) return;
                try {
                    const res = await fetch(`${API_URL}/api/v1/admin/users/${user.id}`, { method: 'DELETE' });
                    if (!res.ok) throw new Error('Failed to delete user');
                    await loadUsers();
                } catch (e) {
                    setError(e.message);
                }
            };

            if (loading) return <div className="container"><div className="loading"></div> Loading users...</div>;

            const inputStyle = {
                padding: '0.5rem 0.75rem', border: '1px solid var(--border)', borderRadius: '6px',
                fontSize: '0.85rem', width: '100%', background: 'var(--surface)', color: 'var(--text-primary)',
            };
            const roleBadge = (role) => ({
                padding: '2px 8px', borderRadius: '12px', fontSize: '0.7rem', fontWeight: 700, textTransform: 'uppercase',
                background: role === 'admin' ? 'rgba(251,191,36,0.15)' : role === 'analyst' ? 'rgba(74,143,212,0.15)' : 'rgba(138,155,176,0.15)',
                color: role === 'admin' ? '#FBbf24' : role === 'analyst' ? '#4A8FD4' : '#8A9BB0',
            });

            return (
                <div className="container">
                    <div style={{ marginBottom: '1.5rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <h1 style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--text-primary)' }}>User Management</h1>
                        <button className="btn btn-primary" onClick={() => setShowCreate(!showCreate)}>
                            {showCreate ? 'Cancel' : '+ Add User'}
                        </button>
                    </div>

                    {error && (
                        <div style={{ background: 'rgba(248,113,113,0.1)', border: '1px solid rgba(248,113,113,0.3)', color: '#F87171', padding: '0.75rem 1rem', borderRadius: '8px', marginBottom: '1rem', fontSize: '0.85rem' }}>
                            {error}
                            <span onClick={() => setError('')} style={{ float: 'right', cursor: 'pointer', fontWeight: 700 }}>x</span>
                        </div>
                    )}

                    {showCreate && (
                        <div className="card" style={{ marginBottom: '1.5rem', padding: '1.5rem' }}>
                            <h3 style={{ fontSize: '1rem', fontWeight: 600, marginBottom: '1rem', color: 'var(--text-primary)' }}>Create New User</h3>
                            <form onSubmit={handleCreate}>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem', marginBottom: '1rem' }}>
                                    <div>
                                        <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--text-secondary)', display: 'block', marginBottom: '4px' }}>Name</label>
                                        <input style={inputStyle} placeholder="Full name" value={newUser.name}
                                            onChange={e => setNewUser(p => ({ ...p, name: e.target.value }))} />
                                    </div>
                                    <div>
                                        <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--text-secondary)', display: 'block', marginBottom: '4px' }}>Email *</label>
                                        <input style={inputStyle} type="email" placeholder="user@company.com" required value={newUser.email}
                                            onChange={e => setNewUser(p => ({ ...p, email: e.target.value }))} />
                                    </div>
                                    <div>
                                        <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--text-secondary)', display: 'block', marginBottom: '4px' }}>Password *</label>
                                        <input style={inputStyle} type="password" placeholder="Temporary password" required value={newUser.password}
                                            onChange={e => setNewUser(p => ({ ...p, password: e.target.value }))} />
                                    </div>
                                    <div>
                                        <label style={{ fontSize: '0.75rem', fontWeight: 600, color: 'var(--text-secondary)', display: 'block', marginBottom: '4px' }}>Role</label>
                                        <select style={inputStyle} value={newUser.role}
                                            onChange={e => setNewUser(p => ({ ...p, role: e.target.value }))}>
                                            <option value="analyst">Analyst</option>
                                            <option value="viewer">Viewer</option>
                                            <option value="admin">Admin</option>
                                        </select>
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                    <button type="submit" className="btn btn-primary" style={{ fontSize: '0.85rem' }}>Create User</button>
                                    <button type="button" className="btn btn-secondary" style={{ fontSize: '0.85rem' }} onClick={() => setShowCreate(false)}>Cancel</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="card">
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th style={{ textAlign: 'right' }}>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {users.map(user => (
                                    <tr key={user.id}>
                                        <td>
                                            {editingId === user.id ? (
                                                <input style={{ ...inputStyle, width: '150px' }} value={editData.name || ''}
                                                    onChange={e => setEditData(p => ({ ...p, name: e.target.value }))} />
                                            ) : (
                                                <span style={{ fontWeight: 500 }}>{user.name || '—'}</span>
                                            )}
                                        </td>
                                        <td style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>{user.email}</td>
                                        <td>
                                            {editingId === user.id ? (
                                                <select style={{ ...inputStyle, width: '110px' }} value={editData.role || user.role}
                                                    onChange={e => setEditData(p => ({ ...p, role: e.target.value }))}>
                                                    <option value="analyst">Analyst</option>
                                                    <option value="viewer">Viewer</option>
                                                    <option value="admin">Admin</option>
                                                </select>
                                            ) : (
                                                <span style={roleBadge(user.role)}>{user.role}</span>
                                            )}
                                        </td>
                                        <td>
                                            <span style={{
                                                padding: '2px 8px', borderRadius: '12px', fontSize: '0.7rem', fontWeight: 700,
                                                background: user.is_active ? 'rgba(52,211,153,0.15)' : 'rgba(248,113,113,0.15)',
                                                color: user.is_active ? 'var(--green)' : 'var(--red)',
                                            }}>
                                                {user.is_active ? 'Active' : 'Disabled'}
                                            </span>
                                        </td>
                                        <td style={{ textAlign: 'right' }}>
                                            {editingId === user.id ? (
                                                <div style={{ display: 'flex', gap: '0.25rem', justifyContent: 'flex-end' }}>
                                                    <input style={{ ...inputStyle, width: '120px' }} type="password" placeholder="New password"
                                                        onChange={e => setEditData(p => ({ ...p, password: e.target.value }))} />
                                                    <button onClick={() => handleUpdate(user.id)}
                                                        style={{ padding: '4px 10px', background: 'var(--green)', color: 'white', border: 'none', borderRadius: '6px', fontSize: '0.75rem', cursor: 'pointer', fontWeight: 600 }}>
                                                        Save
                                                    </button>
                                                    <button onClick={() => { setEditingId(null); setEditData({}); }}
                                                        style={{ padding: '4px 10px', background: 'var(--border)', color: 'var(--text-primary)', border: 'none', borderRadius: '6px', fontSize: '0.75rem', cursor: 'pointer' }}>
                                                        Cancel
                                                    </button>
                                                </div>
                                            ) : (
                                                <div style={{ display: 'flex', gap: '0.25rem', justifyContent: 'flex-end' }}>
                                                    <button onClick={() => { setEditingId(user.id); setEditData({ name: user.name, role: user.role }); }}
                                                        style={{ padding: '4px 10px', background: 'var(--blue)', color: 'white', border: 'none', borderRadius: '6px', fontSize: '0.75rem', cursor: 'pointer' }}>
                                                        Edit
                                                    </button>
                                                    <button onClick={() => handleToggleActive(user)}
                                                        style={{ padding: '4px 10px', background: user.is_active ? 'rgba(251,191,36,0.2)' : 'rgba(52,211,153,0.2)', color: user.is_active ? '#FBbf24' : 'var(--green)', border: 'none', borderRadius: '6px', fontSize: '0.75rem', cursor: 'pointer' }}>
                                                        {user.is_active ? 'Disable' : 'Enable'}
                                                    </button>
                                                    <button onClick={() => handleDelete(user)}
                                                        style={{ padding: '4px 10px', background: 'var(--red)', color: 'white', border: 'none', borderRadius: '6px', fontSize: '0.75rem', cursor: 'pointer' }}>
                                                        Delete
                                                    </button>
                                                </div>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                                {users.length === 0 && (
                                    <tr><td colSpan={5} style={{ textAlign: 'center', padding: '2rem', color: 'var(--text-secondary)' }}>No users found</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>

                    <div style={{ marginTop: '1rem', fontSize: '0.8rem', color: 'var(--text-secondary)' }}>
                        <strong>Roles:</strong> Admin — full access + user management | Analyst — upload, parse, analyze deals | Viewer — view shared deals only
                    </div>
                </div>
            );
        };

        // Main App
        function App() {
            const [currentView, setCurrentView] = useState('list');
            const [selectedDealId, setSelectedDealId] = useState(null);
            const [deal, setDeal] = useState(null);
            const [userName, setUserName] = useState('');
            const [userRole, setUserRole] = useState('');

            // Fetch current user info on mount
            useEffect(() => {
                if (!DEMO_MODE) {
                    fetch(`${API_URL}/me`)
                        .then(r => r.ok ? r.json() : null)
                        .then(data => {
                            if (data) {
                                setUserName(data.name || data.email || '');
                                setUserRole(data.role || '');
                            }
                        })
                        .catch(() => {});
                }
            }, []);

            const handleSelectDeal = async (dealId) => {
                const dealData = await fetchDeal(dealId);
                if (dealData) {
                    setDeal(dealData);
                    setSelectedDealId(dealId);
                    setCurrentView('dashboard');
                }
            };

            const handleUploadSuccess = async (dealId) => {
                await handleSelectDeal(dealId);
            };

            const handleBack = () => {
                setCurrentView('list');
                setSelectedDealId(null);
                setDeal(null);
            };

            return (
                <>
                    <Header
                        currentPage={currentView}
                        dealName={deal?.property_name}
                        userName={userName}
                        userRole={userRole}
                        onAdminClick={() => setCurrentView(currentView === 'admin' ? 'list' : 'admin')}
                        onHomeClick={() => { setCurrentView('list'); setSelectedDealId(null); setDeal(null); }}
                    />

                    {currentView === 'list' && (
                        <DealListView
                            onSelectDeal={handleSelectDeal}
                            onUpload={() => setCurrentView('upload')}
                        />
                    )}

                    {currentView === 'upload' && (
                        <UploadView
                            onCancel={() => setCurrentView('list')}
                            onSuccess={handleUploadSuccess}
                        />
                    )}

                    {currentView === 'dashboard' && deal && (
                        <ErrorBoundary onBack={handleBack}>
                            <DashboardV2View deal={deal} onBack={handleBack} />
                        </ErrorBoundary>
                    )}

                    {currentView === 'admin' && (
                        <AdminPanel onBack={() => setCurrentView('list')} />
                    )}

                    <div style={{
                        textAlign: 'center',
                        padding: '2rem 1rem 1.5rem',
                        borderTop: '1px solid rgba(255,255,255,0.06)',
                        marginTop: '2rem',
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', marginBottom: '6px' }}>
                            <img src={CRELYTIC_ICON_B64} alt="" style={{ height: '16px', opacity: 0.5 }} />
                            <span style={{ fontSize: '0.7rem', color: '#475569', fontWeight: 600, letterSpacing: '0.5px', fontFamily: "'DM Sans', system-ui, sans-serif" }}>CRE<span style={{ color: '#00897B' }}>lytic</span></span>
                        </div>
                        <div style={{ fontSize: '0.6rem', color: '#334155', letterSpacing: '0.3px' }}>
                            Institutional-Grade Deal Underwriting Engine &bull; Rising Tide CRE
                        </div>
                    </div>
                </>
            );
        }

        // Render app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
