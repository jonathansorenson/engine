<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRE Lytic — Deal Underwriting</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0A1628;
            --navy-light: #0F2236;
            --blue: #4A8FD4;
            --teal: #00BFA5;
            --green: #34D399;
            --red: #F87171;
            --amber: #FBbf24;
            --slate: #8A9BB0;
            --bg: #0A1628;
            --card: #0F2236;
            --border: #1E3347;
            --text-primary: #E8EDF2;
            --text-secondary: #8A9BB0;
            --surface: #132A42;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--navy); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--slate); }

        /* Header */
        .header {
            background: rgba(10, 22, 40, 0.9);
            backdrop-filter: blur(4px);
            color: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(30, 51, 71, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-divider {
            width: 1px;
            height: 1.5rem;
            background: rgba(255, 255, 255, 0.15);
        }

        .breadcrumb {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        .btn-primary {
            background-color: var(--teal);
            color: white;
        }

        .btn-primary:hover {
            background-color: #00A890;
            box-shadow: 0 4px 12px rgba(0, 191, 165, 0.3);
        }

        .btn-secondary {
            background-color: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--card);
            border-color: var(--blue);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Tables */
        .table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .table thead {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .table th {
            padding: 0.875rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--slate);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table td {
            padding: 0.875rem 1rem;
            border-bottom: 1px solid rgba(30, 51, 71, 0.5);
            font-size: 0.875rem;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
        }

        .table tbody tr:hover {
            background-color: rgba(30, 51, 71, 0.4);
            cursor: pointer;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        /* KPI Cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .kpi-card:hover {
            border-color: rgba(74, 143, 212, 0.3);
        }

        .kpi-label {
            font-size: 0.6875rem;
            color: var(--slate);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .kpi-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            font-family: 'JetBrains Mono', monospace;
        }

        .kpi-trend {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .kpi-trend.positive {
            color: var(--green);
        }

        .kpi-trend.negative {
            color: var(--red);
        }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .assumptions-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .slider-group {
            background: var(--card);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border);
        }

        .slider-item {
            margin-bottom: 1.5rem;
        }

        .slider-item:last-child {
            margin-bottom: 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .slider-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.8125rem;
        }

        .slider-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--blue);
            font-size: 0.8125rem;
        }

        .slider {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(74, 143, 212, 0.4);
            border: 2px solid var(--card);
        }

        .slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(74, 143, 212, 0.4);
            border: 2px solid var(--card);
        }

        .slider-range {
            display: flex;
            justify-content: space-between;
            font-size: 0.6875rem;
            color: var(--slate);
            margin-top: 0.5rem;
        }

        /* Chat Widget */
        .chat-widget {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 500px;
            position: sticky;
            top: 5rem;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chat-message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.8125rem;
            line-height: 1.4;
        }

        .chat-message.user {
            background: rgba(74, 143, 212, 0.15);
            color: var(--blue);
            align-self: flex-end;
            max-width: 80%;
            border: 1px solid rgba(74, 143, 212, 0.3);
        }

        .chat-message.assistant {
            background: var(--surface);
            color: var(--text-primary);
            align-self: flex-start;
            max-width: 90%;
            border: 1px solid var(--border);
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.8125rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text-primary);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(74, 143, 212, 0.15);
        }

        /* Sensitivity Table */
        .sensitivity-table {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .sensitivity-grid {
            border-collapse: collapse;
            min-width: 800px;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .sensitivity-grid th {
            background: var(--surface);
            color: var(--slate);
            padding: 0.75rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sensitivity-grid td {
            padding: 0.75rem;
            text-align: center;
            font-size: 0.8125rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            border: 1px solid rgba(30, 51, 71, 0.5);
            color: var(--text-primary);
        }

        .sensitivity-grid tr:first-child td:first-child {
            background: var(--surface);
        }

        .sensitivity-cell {
            position: relative;
        }

        .sensitivity-cell.above {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
        }

        .sensitivity-cell.below {
            background: rgba(248, 113, 113, 0.15);
            color: var(--red);
        }

        /* Upload Area */
        .upload-container {
            max-width: 600px;
            margin: 3rem auto;
        }

        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(15, 34, 54, 0.5);
        }

        .dropzone:hover,
        .dropzone.active {
            background: rgba(74, 143, 212, 0.08);
            border-color: var(--blue);
        }

        .dropzone-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .dropzone-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .dropzone-hint {
            font-size: 0.875rem;
            color: var(--slate);
            margin-bottom: 1.5rem;
        }

        .file-list {
            margin-top: 1.5rem;
            text-align: left;
        }

        .file-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .file-icon {
            font-size: 1.5rem;
            min-width: 24px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
        }

        .status-draft {
            background: rgba(245, 158, 11, 0.1);
            color: var(--amber);
        }

        .status-completed {
            background: rgba(37, 99, 235, 0.1);
            color: var(--blue);
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Property Header */
        .property-header {
            background: var(--card);
            border-radius: 0.75rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .property-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            font-family: 'DM Serif Display', serif;
            margin-bottom: 0.5rem;
        }

        .property-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .property-detail {
            border-left: 3px solid var(--blue);
            padding-left: 1rem;
        }

        .property-detail-label {
            font-size: 0.75rem;
            color: var(--slate);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .property-detail-value {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .chat-widget {
                position: relative;
                top: 0;
                height: auto;
                min-height: 300px;
            }

            .kpi-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .kpi-row {
                grid-template-columns: 1fr;
            }

            .property-details {
                grid-template-columns: 1fr;
            }

            .sensitivity-grid {
                font-size: 0.8rem;
            }

            .sensitivity-grid td,
            .sensitivity-grid th {
                padding: 0.5rem;
            }

            .table th,
            .table td {
                padding: 0.75rem;
            }
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 2rem;
        }

        /* Section Titles */
        .section-title {
            font-size: 1.3125rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 1.5rem;
            background: var(--blue);
            border-radius: 2px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--slate);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        // Configuration
        const API_URL = window.location.origin + '/engine';
        const DEMO_MODE = false; // Set to true to preview UI without backend

        // Utility Functions
        const formatCurrency = (value) => {
            if (value >= 1000000) {
                return `$${(value / 1000000).toFixed(1)}M`;
            } else if (value >= 1000) {
                return `$${(value / 1000).toFixed(1)}K`;
            }
            return `$${value.toFixed(0)}`;
        };

        const formatPercent = (value) => `${(value * 100).toFixed(2)}%`;

        const formatPSF = (value) => `$${value.toFixed(2)}/SF`;

        const formatSF = (value) => `${(value || 0).toLocaleString('en-US', { maximumFractionDigits: 0 })} SF`;

        const formatRatio = (value) => `${(value || 0).toFixed(2)}x`;

        // Financial Calculations
        const monthlyPayment = (principal, annualRate, amortYears) => {
            const r = annualRate / 12;
            const n = amortYears * 12;
            if (r === 0) return principal / n;
            return principal * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        };

        const annualDebtService = (principal, annualRate, amortYears) => {
            return monthlyPayment(principal, annualRate, amortYears) * 12;
        };

        const annualDebtServiceIO = (principal, annualRate) => {
            return principal * annualRate;
        };

        const loanBalanceAtYear = (principal, annualRate, amortYears, yearN) => {
            const r = annualRate / 12;
            const n = amortYears * 12;
            const p = yearN * 12;
            const pmt = monthlyPayment(principal, annualRate, amortYears);
            if (r === 0) return principal - (pmt * p);
            return principal * Math.pow(1 + r, p) - pmt * (Math.pow(1 + r, p) - 1) / r;
        };

        const calculateIRR = (cashFlows, guess = 0.10) => {
            let rate = guess;
            for (let i = 0; i < 100; i++) {
                let npv = 0, dnpv = 0;
                for (let t = 0; t < cashFlows.length; t++) {
                    npv += cashFlows[t] / Math.pow(1 + rate, t);
                    dnpv -= t * cashFlows[t] / Math.pow(1 + rate, t + 1);
                }
                if (Math.abs(dnpv) < 1e-12) break;
                const newRate = rate - npv / dnpv;
                if (Math.abs(newRate - rate) < 1e-8) return newRate;
                rate = newRate;
            }
            return rate;
        };

        // Demo Data
        const DEMO_DEALS = [
            {
                id: '1',
                property_name: 'Westlake Commerce Center',
                address: '1234 Commerce Drive, Austin, TX 78704',
                property_type: 'Industrial',
                asking_price: 45000000,
                noi: 2700000,
                rentable_sf: 320000,
                cap_rate: 0.06,
                dscr: 1.35,
                ltv: 0.65,
                status: 'active',
                created_at: '2025-02-01',
                assumptions: {
                    exit_cap_rate: 0.065,
                    noi_growth: 0.02,
                    hold_period: 5,
                    ltv: 0.65,
                    interest_rate: 0.045,
                    amortization_years: 25
                },
                rent_roll: [
                    { unit: 'Suite A', tenant: 'Tech Logistics Inc', sf: 50000, rent_psf: 8.50, annual_rent: 425000, expiry: '2027-06-30' },
                    { unit: 'Suite B', tenant: 'Distribution Plus', sf: 80000, rent_psf: 7.50, annual_rent: 600000, expiry: '2028-12-31' },
                    { unit: 'Suite C', tenant: 'Supply Chain Co', sf: 60000, rent_psf: 8.00, annual_rent: 480000, expiry: '2026-09-30' },
                    { unit: 'Suite D', tenant: 'Vacant', sf: 130000, rent_psf: 0, annual_rent: 0, expiry: 'N/A' }
                ]
            },
            {
                id: '2',
                property_name: 'Central Plaza Office',
                address: '5678 Business Boulevard, Denver, CO 80202',
                property_type: 'Office',
                asking_price: 32000000,
                noi: 1920000,
                rentable_sf: 240000,
                cap_rate: 0.06,
                dscr: 1.42,
                ltv: 0.60,
                status: 'draft',
                created_at: '2025-02-15',
                assumptions: {
                    exit_cap_rate: 0.07,
                    noi_growth: 0.015,
                    hold_period: 7,
                    ltv: 0.60,
                    interest_rate: 0.04,
                    amortization_years: 25
                },
                rent_roll: []
            }
        ];

        // API Functions
        const fetchDeals = async () => {
            if (DEMO_MODE) {
                return DEMO_DEALS;
            }
            try {
                const res = await fetch(`${API_URL}/api/v1/deals`);
                if (!res.ok) throw new Error('Failed to fetch deals');
                const apiDeals = await res.json();
                // Map API field names to what the UI expects
                return apiDeals.map(d => ({
                    ...d,
                    property_name: d.name || d.property_name || 'Untitled Deal',
                    asking_price: d.asking_price || 0,
                    noi: d.noi || 0,
                    cap_rate: d.cap_rate ? (d.cap_rate > 1 ? d.cap_rate / 100 : d.cap_rate) : 0,
                }));
            } catch (error) {
                console.error('Error fetching deals:', error);
                return [];
            }
        };

        // Map API response (nested parsed_data) to flat deal object the UI expects
        const mapApiDealToFlatDeal = (apiDeal) => {
            if (!apiDeal) return null;
            const pd = apiDeal.parsed_data || {};
            const prop = pd.property || {};
            const fin = pd.financials || {};
            const assumptions = apiDeal.assumptions || pd.assumptions || {};

            const raw_asking_price = prop.asking_price || fin.asking_price || 0;
            const noi = fin.noi || 0;
            const total_sf = prop.total_sf || fin.total_sf || 0;
            const cap_rate = fin.cap_rate
                ? (fin.cap_rate > 1 ? fin.cap_rate / 100 : fin.cap_rate)
                : 0.07;  // Default 7% cap if not extracted
            // If no asking price found on page 1, derive from NOI / Cap Rate
            const asking_price = raw_asking_price > 0 ? raw_asking_price : (noi > 0 && cap_rate > 0 ? Math.round(noi / cap_rate) : 0);

            return {
                id: apiDeal.id,
                _raw_asking_price: raw_asking_price,  // Track whether price was extracted from OM
                property_name: prop.name || apiDeal.name || apiDeal.original_filename || 'Untitled Deal',
                address: prop.address || prop.city ? `${prop.address || ''}${prop.city ? ', ' + prop.city : ''}${prop.state ? ' ' + prop.state : ''}`.trim() : 'N/A',

        const SensitivityTable = ({ asking_price, noi, assumptions }) => {
            const capRates = [0.050, 0.0525, 0.055, 0.0575, 0.060, 0.0625, 0.065, 0.0675, 0.070, 0.0725, 0.080];
            const noiGrowths = [-0.05, -0.025, 0, 0.025, 0.05, 0.075, 0.10];

            const getValue = (cap, growth) => {
                const exitNOI = noi * Math.pow(1 + growth, assumptions.hold_period);
                const value = exitNOI / cap;
                return value;
            };

            return (
                <div>
                    <div className="section-title">Sensitivity Analysis: Property Value</div>
                    <div className="sensitivity-table">
                        <table className="sensitivity-grid">
                            <thead>
                                <tr>
                                    <th>NOI Growth / Exit Cap</th>
                                    {capRates.map(cap => (
                                        <th key={cap}>{formatPercent(cap)}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {noiGrowths.map(growth => {
                                    const values = capRates.map(cap => getValue(cap, growth));
                                    const maxVal = Math.max(...values);
                                    const minVal = Math.min(...values);

                                    return (
                                        <tr key={growth}>
                                            <th style={{ background: 'var(--bg)', textAlign: 'left', fontWeight: 600, color: 'var(--text-primary)' }}>
                                                {formatPercent(growth)}
                                            </th>
                                            {capRates.map(cap => {
                                                const value = getValue(cap, growth);
                                                const isAbove = value > asking_price;
                                                return (
                                                    <td
                                                        key={cap}
                                                        className={`sensitivity-cell ${isAbove ? 'above' : 'below'}`}
                                                    >
                                                        {formatCurrency(value / 1000000)}M
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const CashFlowTable = ({ noi, asking_price, assumptions, rentable_sf }) => {
            const cashFlows = [];
            const initialDebt = asking_price * (assumptions.ltv || 0.65);
            const equity = asking_price * (1 - (assumptions.ltv || 0.65));
            const isIO = assumptions.interest_only;
            const holdYears = isIO ? (assumptions.io_term || 5) : assumptions.hold_period;
            const ds = isIO
                ? annualDebtServiceIO(initialDebt, assumptions.interest_rate)
                : annualDebtService(initialDebt, assumptions.interest_rate, assumptions.amortization_years);

            for (let year = 1; year <= holdYears; year++) {
                const yearNOI = noi * Math.pow(1 + assumptions.noi_growth, year);
                const capReserves = rentable_sf * 0.4; // $0.40/SF
                const cashFlow = yearNOI - ds - capReserves;
                const balance = isIO
                    ? initialDebt
                    : loanBalanceAtYear(initialDebt, assumptions.interest_rate, assumptions.amortization_years, year);
                const coc = equity > 0 ? (yearNOI - ds) / equity : 0;

                cashFlows.push({ year, noi: yearNOI, ds, capReserves, cashFlow, balance, coc });
            }

            return (
                <div>
                    <div className="section-title">
                        Cash Flow Projection {isIO && <span style={{ fontSize: '0.7rem', background: 'rgba(0,191,165,0.15)', color: '#00BFA5', padding: '2px 6px', borderRadius: '4px', fontWeight: 600, marginLeft: '8px' }}>IO</span>}
                    </div>
                    <div style={{ overflowX: 'auto' }}>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Year</th>
                                    <th>NOI</th>
                                    <th>Debt Service</th>
                                    <th>Cap Reserves</th>
                                    <th>Cash Flow</th>
                                    <th>Loan Balance</th>
                                    <th>Cash-on-Cash</th>
                                </tr>
                            </thead>
                            <tbody>
                                {cashFlows.map(cf => (
                                    <tr key={cf.year}>
                                        <td><strong>{cf.year}</strong></td>
                                        <td>{formatCurrency(cf.noi)}</td>
                                        <td>{formatCurrency(cf.ds)}</td>
                                        <td>{formatCurrency(cf.capReserves)}</td>
                                        <td style={{ fontWeight: 600, color: cf.cashFlow > 0 ? 'var(--green)' : 'var(--red)' }}>
                                            {formatCurrency(cf.cashFlow)}
                                        </td>
                                        <td>{formatCurrency(cf.balance)}</td>
                                        <td style={{ fontWeight: 600, color: cf.coc > 0.08 ? 'var(--green)' : cf.coc > 0 ? 'var(--amber)' : 'var(--red)' }}>
                                            {formatPercent(cf.coc)}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const IRRMatrix = ({ noi, asking_price, assumptions }) => {
            const exitCaps = [0.055, 0.060, 0.065, 0.070, 0.075, 0.080];
            const holdPeriods = [3, 5, 7, 10];

            const calculateIRRCell = (exitCap, hold) => {
                const equity = asking_price * (1 - (assumptions.ltv || 0.65));
                const debt = asking_price * (assumptions.ltv || 0.65);
                const isIO = assumptions.interest_only;

                const cfs = [-equity];
                for (let y = 1; y <= hold; y++) {
                    const yearNOI = noi * Math.pow(1 + assumptions.noi_growth, y);
                    const ds = isIO
                        ? annualDebtServiceIO(debt, assumptions.interest_rate)
                        : annualDebtService(debt, assumptions.interest_rate, assumptions.amortization_years);
                    const capReserves = assumptions.sf ? assumptions.sf * 0.4 : 0;
                    cfs.push(yearNOI - ds - capReserves);
                }

                // Sale proceeds
                const exitNOI = noi * Math.pow(1 + assumptions.noi_growth, hold);
                const salePrice = exitNOI / exitCap;
                const loanBal = isIO ? debt : loanBalanceAtYear(debt, assumptions.interest_rate, assumptions.amortization_years, hold);
                cfs[cfs.length - 1] += (salePrice - loanBal);

                return calculateIRR(cfs);
            };

            return (
                <div>
                    <div className="section-title">IRR Sensitivity Analysis</div>
                    <div style={{ overflowX: 'auto' }}>
                        <table className="sensitivity-grid">
                            <thead>
                                <tr>
                                    <th>Exit Cap / Hold Period</th>
                                    {holdPeriods.map(hold => (
                                        <th key={hold}>{hold}Y</th>
                                    ))}
                                </tr>
                            </thead>

                                {exitCaps.map(cap => (
                                    <tr key={cap}>
                                        <th style={{ background: 'var(--bg)', textAlign: 'left', fontWeight: 600, color: 'var(--text-primary)' }}>
                                            {formatPercent(cap)}
                                        </th>
                                        {holdPeriods.map(hold => {
                                            const irr = calculateIRRCell(cap, hold);
                                            return (
                                                <td
                                                    key={hold}
                                                    className={`sensitivity-cell ${irr > 0.15 ? 'above' : 'below'}`}
                                                >
                                                    {formatPercent(irr)}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

                }

                try {
                    const res = await fetch(`${API_URL}/api/v1/deals/${dealId}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMessage })
                    });

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let assistantMessage = '';
                    let messageId = messages.length + 1;

                    setMessages(prev => [...prev, { id: messageId, type: 'assistant', text: '' }]);

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value);
                        assistantMessage += chunk;

                        setMessages(prev => {
                            const updated = [...prev];
                            updated[updated.length - 1].text = assistantMessage;
                            return updated;
                        });
                    }
                } catch (error) {
                    setMessages(prev => [...prev, {
                        id: prev.length + 1,
                        type: 'assistant',
                        text: 'Error connecting to chat service. Please try again.'
                    }]);
                }

                setLoading(false);
            };

            return (
                <div className="chat-widget">
                    <div className="chat-header">💬 Deal Insights</div>
                    <div className="chat-messages">
                        {messages.map(msg => (
                            <div key={msg.id} className={`chat-message ${msg.type}`}>
                                {msg.text}
                            </div>
                        ))}
                        <div ref={messagesEnd} />
                    </div>
                    <form className="chat-input-area" onSubmit={handleSendMessage}>
                        <input
                            type="text"
                            className="chat-input"
                            placeholder="Ask about the deal..."
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            disabled={loading}
                        />
                        <button type="submit" className="btn btn-primary btn-sm" disabled={loading || !input.trim()}>
                            {loading ? <span className="loading"></span> : '→'}
                        </button>
                    </form>
                </div>
            );
        };

        const RentRollTable = ({ rentRoll }) => {
            if (!rentRoll || rentRoll.length === 0) {
                return (
                    <div>
                        <div className="section-title">Rent Roll</div>
                        <div className="card">
                            <div className="empty-state">
                                <div className="empty-state-icon">🏢</div>
                                <div className="empty-state-title">No rent roll data</div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <div className="section-title">Rent Roll</div>
                    <div style={{ overflowX: 'auto' }}>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Unit</th>
                                    <th>Tenant</th>
                                    <th>SF</th>
                                    <th>Rent PSF</th>
                                    <th>Annual Rent</th>
                                    <th>Lease Expiry</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rentRoll.map((unit, idx) => (
                                    <tr key={idx}>
                                        <td><strong>{unit.unit}</strong></td>
                                        <td>{unit.tenant}</td>
                                        <td>{formatSF(unit.sf)}</td>
                                        <td>{formatPSF(unit.rent_psf)}</td>
                                        <td>{formatCurrency(unit.annual_rent)}</td>
                                        <td>{unit.expiry}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════
        // ANALYSIS TAB — Debt Constant, Leverage Check, WALT
        // ═══════════════════════════════════════════════════════
        const AnalysisPanel = ({ deal, assumptions }) => {
            const [amortYears, setAmortYears] = useState(assumptions.amortization_years || 25);
            const [intRate, setIntRate] = useState((assumptions.interest_rate || 0.055) * 100);
            const [targetWALT, setTargetWALT] = useState(5.0);

            // Debt Constant = ADS / Loan Amount
            const loanAmount = deal.asking_price * (assumptions.ltv || 0.65);
            const ads = annualDebtService(loanAmount, intRate / 100, amortYears);
            const debtConstant = loanAmount > 0 ? (ads / loanAmount) : 0;
            const capRate = deal.cap_rate || (deal.noi / deal.asking_price);

            // Leverage spread
            const spread = capRate - debtConstant;
            // Gradient: -3% (deep red) → 0 (yellow) → +3% (deep green)
            const clampedSpread = Math.max(-0.03, Math.min(0.03, spread));
            const pct = (clampedSpread + 0.03) / 0.06; // 0 = deep red, 0.5 = yellow, 1 = green
            const leverageColor = pct < 0.5
                ? `rgb(${Math.round(220)}, ${Math.round(pct * 2 * 180)}, ${Math.round(pct * 2 * 30)})`
                : `rgb(${Math.round((1 - pct) * 2 * 220)}, ${Math.round(160 + (pct - 0.5) * 2 * 40)}, ${Math.round(30 + (pct - 0.5) * 2 * 100)})`;
            const leverageLabel = spread > 0.005 ? 'Positive Leverage' : spread < -0.005 ? 'Negative Leverage' : 'Neutral';

            // WALT calculation from rent roll
            const rentRoll = deal.rent_roll || [];
            const now = new Date();
            let totalWeightedYears = 0;
            let totalSF = 0;
            rentRoll.forEach(lease => {
                const sf = lease.sf || 0;
                const expiry = lease.expiry || lease.lease_end;
                if (expiry && sf > 0) {
                    const expiryDate = new Date(expiry);
                    const yearsRemaining = Math.max(0, (expiryDate - now) / (365.25 * 24 * 60 * 60 * 1000));
                    totalWeightedYears += yearsRemaining * sf;
                    totalSF += sf;
                }
            });
            const currentWALT = totalSF > 0 ? totalWeightedYears / totalSF : 0;
            const waltMeetsTarget = currentWALT >= targetWALT;

            // Debt constant reference table across rates
            const refRates = [3, 4, 5, 5.5, 6, 6.5, 7, 7.5, 8];
            const refAmorts = [15, 20, 25, 30];

            const panelStyle = {
                background: 'var(--card)', borderRadius: '12px', border: '1px solid var(--border)',
                padding: '1.5rem', marginBottom: '1.5rem'
            };
            const sectionTitle = {
                fontSize: '1rem', fontWeight: 700, color: 'var(--text-primary)', marginBottom: '1rem',
                display: 'flex', alignItems: 'center', gap: '0.5rem'
            };

            return (
                <div>
                    {/* Debt Constant Calculator */}
                    <div style={panelStyle}>
                        <div style={sectionTitle}>⚙️ Debt Constant Calculator</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem', marginBottom: '1.5rem' }}>
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.25rem' }}>
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Amortization</span>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                                        <input type="number" min="10" max="35" step="1"
                                            value={amortYears}
                                            onChange={e => { const v = parseInt(e.target.value); if (v >= 10 && v <= 35) setAmortYears(v); }}
                                            style={{ width: '50px', padding: '0.15rem 0.3rem', fontSize: '0.85rem', fontWeight: 700,
                                                fontFamily: "'JetBrains Mono', monospace", border: '1px solid var(--border)', borderRadius: '4px',
                                                textAlign: 'right', outline: 'none' }} />
                                        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>yrs</span>
                                    </div>
                                </div>
                                <input type="range" className="slider" min="10" max="35" step="1"
                                    value={amortYears} onChange={e => setAmortYears(parseInt(e.target.value))}
                                    style={{ width: '100%' }} />
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: 'var(--slate)' }}>
                                    <span>10 yrs</span><span>35 yrs</span>
                                </div>
                            </div>
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.25rem' }}>
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Interest Rate</span>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                                        <input type="number" min="0" max="15" step="0.01"
                                            value={intRate.toFixed(2)}
                                            onChange={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v >= 0 && v <= 15) setIntRate(v); }}
                                            style={{ width: '65px', padding: '0.15rem 0.3rem', fontSize: '0.85rem', fontWeight: 700,
                                                fontFamily: "'JetBrains Mono', monospace", border: '1px solid var(--border)', borderRadius: '4px',
                                                textAlign: 'right', outline: 'none' }} />
                                        <span style={{ fontSize: '0.8rem', color: 'var(--text-secondary)' }}>%</span>
                                    </div>
                                </div>
                                <input type="range" className="slider" min="3" max="9" step="0.125"
                                    value={intRate} onChange={e => setIntRate(parseFloat(e.target.value))}
                                    style={{ width: '100%' }} />
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: 'var(--slate)' }}>
                                    <span>3.00%</span><span>9.00%</span>
                                </div>
                            </div>
                        </div>

                        {/* Big Debt Constant Display */}
                        <div style={{ textAlign: 'center', padding: '1.5rem', background: 'var(--bg)', borderRadius: '10px', marginBottom: '1.5rem' }}>
                            <div style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '0.25rem' }}>Debt Constant</div>
                            <div style={{ fontSize: '2.5rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-primary)' }}>
                                {(debtConstant * 100).toFixed(3)}%
                            </div>
                            <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '0.25rem' }}>
                                ADS: {formatCurrency(ads)} &nbsp;|&nbsp; Loan: {formatCurrency(loanAmount)}
                            </div>
                        </div>

                        {/* Reference Table */}
                        <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginBottom: '0.5rem', fontWeight: 600 }}>Debt Constant Reference (Rate × Amortization)</div>
                        <div style={{ overflowX: 'auto' }}>
                            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.75rem' }}>
                                <thead>
                                    <tr style={{ background: 'var(--surface)', color: 'var(--slate)' }}>
                                        <th style={{ padding: '0.4rem 0.6rem', textAlign: 'left' }}>Rate ↓ / Amort →</th>
                                        {refAmorts.map(a => <th key={a} style={{ padding: '0.4rem 0.6rem', textAlign: 'center' }}>{a} yr</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {refRates.map(rate => (
                                        <tr key={rate} style={{ borderBottom: '1px solid var(--border)' }}>
                                            <td style={{ padding: '0.4rem 0.6rem', fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{rate.toFixed(1)}%</td>
                                            {refAmorts.map(amort => {
                                                const dc = annualDebtService(1, rate / 100, amort);
                                                const isActive = Math.abs(rate - intRate) < 0.2 && amort === amortYears;
                                                return (
                                                    <td key={amort} style={{
                                                        padding: '0.4rem 0.6rem', textAlign: 'center', fontFamily: "'JetBrains Mono', monospace",
                                                        background: isActive ? 'rgba(74,143,212,0.25)' : 'transparent',
                                                        color: isActive ? 'var(--blue)' : 'var(--text-primary)',
                                                        fontWeight: isActive ? 700 : 400,
                                                        borderRadius: isActive ? '4px' : 0
                                                    }}>{(dc * 100).toFixed(2)}%</td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Leverage Indicator: Cap Rate vs Debt Constant */}
                    <div style={panelStyle}>
                        <div style={sectionTitle}>📊 Leverage Analysis — Cap Rate vs Debt Constant</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '1rem', marginBottom: '1.5rem' }}>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>Going-In Cap Rate</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-primary)' }}>{(capRate * 100).toFixed(2)}%</div>
                            </div>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>Debt Constant</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-primary)' }}>{(debtConstant * 100).toFixed(2)}%</div>
                            </div>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>Spread</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: leverageColor }}>
                                    {spread >= 0 ? '+' : ''}{(spread * 100).toFixed(2)}%
                                </div>
                            </div>
                        </div>

                        {/* Gradient Bar */}
                        <div style={{ position: 'relative', height: '48px', borderRadius: '8px', overflow: 'hidden', marginBottom: '0.5rem',
                            background: 'linear-gradient(to right, #dc2626, #dc2626 20%, #f59e0b 45%, #f59e0b 55%, #10b981 80%, #10b981)' }}>
                            {/* Marker */}
                            <div style={{
                                position: 'absolute', top: '2px', bottom: '2px', width: '4px',
                                background: 'var(--blue)', borderRadius: '2px', boxShadow: '0 0 8px rgba(74,143,212,0.5)',
                                left: `${Math.max(2, Math.min(98, pct * 100))}%`, transform: 'translateX(-50%)'
                            }} />
                            <div style={{
                                position: 'absolute', bottom: '-22px',
                                left: `${Math.max(5, Math.min(95, pct * 100))}%`, transform: 'translateX(-50%)',
                                fontSize: '0.7rem', fontWeight: 700, color: leverageColor, whiteSpace: 'nowrap'
                            }}>{leverageLabel}</div>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.65rem', color: 'var(--slate)', marginTop: '1.5rem' }}>
                            <span>← Negative Leverage (Debt Constant &gt; Cap Rate)</span>
                            <span>Positive Leverage (Cap Rate &gt; Debt Constant) →</span>
                        </div>
                    </div>

                    {/* WALT Target */}
                    <div style={panelStyle}>
                        <div style={sectionTitle}>📅 WALT Target</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem' }}>
                            <div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.25rem' }}>
                                    <span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Target WALT</span>
                                    <span style={{ fontSize: '0.85rem', fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>{targetWALT.toFixed(1)} years</span>
                                </div>
                                <input type="range" className="slider" min="1" max="15" step="0.5"
                                    value={targetWALT} onChange={e => setTargetWALT(parseFloat(e.target.value))}
                                    style={{ width: '100%' }} />
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', color: 'var(--slate)' }}>
                                    <span>1 yr</span><span>15 yrs</span>
                                </div>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                <div style={{
                                    padding: '1rem 2rem', borderRadius: '12px', textAlign: 'center',
                                    background: waltMeetsTarget ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)',
                                    border: `2px solid ${waltMeetsTarget ? 'var(--green)' : 'var(--red)'}`,
                                }}>
                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px', marginBottom: '0.25rem' }}>Current WALT</div>
                                    <div style={{ fontSize: '2rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: waltMeetsTarget ? 'var(--green)' : 'var(--red)' }}>
                                        {currentWALT.toFixed(1)} yrs
                                    </div>
                                    <div style={{ fontSize: '0.8rem', fontWeight: 600, color: waltMeetsTarget ? 'var(--green)' : 'var(--red)', marginTop: '0.25rem' }}>
                                        {waltMeetsTarget ? '✓ Meets Target' : '✗ Below Target'}
                                    </div>
                                </div>
                            </div>
                        </div>
                        {rentRoll.length === 0 && (
                            <div style={{ marginTop: '1rem', padding: '0.75rem', background: 'rgba(245, 158, 11, 0.1)', borderRadius: '8px', border: '1px solid rgba(245, 158, 11, 0.3)', fontSize: '0.8rem', color: '#92400e' }}>
                                ⚠ No rent roll data available — WALT cannot be calculated. Upload an Excel file with lease expiry dates.
                            </div>
                        )}
                    </div>

                    {/* ── Debt Metrics: Debt/Foot & Debt Yield ── */}
                    <div style={panelStyle}>
                        <div style={sectionTitle}>💰 Debt Metrics</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '1rem' }}>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>Loan Amount</div>
                                <div style={{ fontSize: '1.3rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-primary)' }}>{formatCurrency(loanAmount)}</div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', marginTop: '0.25rem' }}>{((assumptions.ltv || 0.65) * 100).toFixed(0)}% LTV</div>
                            </div>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>Debt / Foot</div>
                                <div style={{ fontSize: '1.3rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-primary)' }}>
                                    {deal.rentable_sf > 0 ? formatCurrency(loanAmount / deal.rentable_sf) : '—'}
                                </div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', marginTop: '0.25rem' }}>per RSF</div>
                            </div>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>Debt Yield</div>
                                <div style={{ fontSize: '1.3rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: loanAmount > 0 && (deal.noi / loanAmount) >= 0.08 ? 'var(--green)' : loanAmount > 0 && (deal.noi / loanAmount) >= 0.06 ? '#f59e0b' : 'var(--red)' }}>
                                    {loanAmount > 0 ? ((deal.noi / loanAmount) * 100).toFixed(2) + '%' : '—'}
                                </div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', marginTop: '0.25rem' }}>NOI ÷ Loan</div>
                            </div>
                            <div style={{ textAlign: 'center', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '1px' }}>DSCR</div>
                                <div style={{ fontSize: '1.3rem', fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: ads > 0 && (deal.noi / ads) >= 1.25 ? 'var(--green)' : ads > 0 && (deal.noi / ads) >= 1.0 ? '#f59e0b' : 'var(--red)' }}>
                                    {ads > 0 ? (deal.noi / ads).toFixed(2) + 'x' : '—'}
                                </div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-secondary)', marginTop: '0.25rem' }}>NOI ÷ ADS</div>
                            </div>
                        </div>
                    </div>

                    {/* ── NOI / Debt Service / Free Cash Flow Table ── */}
                    {(() => {
                        const holdYears = assumptions.hold_period || 5;
                        const noiGrowth = assumptions.noi_growth ? (assumptions.noi_growth > 1 ? assumptions.noi_growth / 100 : assumptions.noi_growth) : 0.02;
                        const baseNOI = deal.noi || 0;
                        const yearRows = [];
                        for (let yr = 1; yr <= holdYears; yr++) {
                            const projNOI = baseNOI * Math.pow(1 + noiGrowth, yr);
                            yearRows.push({ year: yr, noi: projNOI, ads: ads, fcf: projNOI - ads });
                        }
                        const totalNOI = yearRows.reduce((s, r) => s + r.noi, 0);
                        const totalADS = yearRows.reduce((s, r) => s + r.ads, 0);
                        const totalFCF = yearRows.reduce((s, r) => s + r.fcf, 0);

                        return (
                            <div style={panelStyle}>
                                <div style={sectionTitle}>📈 NOI vs Debt Service — {holdYears}-Year Hold</div>
                                <div style={{ overflowX: 'auto' }}>
                                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.8rem' }}>
                                        <thead>
                                            <tr style={{ background: 'var(--surface)', color: 'var(--slate)' }}>
                                                <th style={{ padding: '0.6rem 0.8rem', textAlign: 'left' }}>Year</th>
                                                <th style={{ padding: '0.6rem 0.8rem', textAlign: 'right' }}>NOI</th>
                                                <th style={{ padding: '0.6rem 0.8rem', textAlign: 'right' }}>Debt Service (ADS)</th>
                                                <th style={{ padding: '0.6rem 0.8rem', textAlign: 'right' }}>Free Cash Flow</th>
                                                <th style={{ padding: '0.6rem 0.8rem', textAlign: 'right' }}>DSCR</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {yearRows.map(r => (
                                                <tr key={r.year} style={{ borderBottom: '1px solid var(--border)' }}>
                                                    <td style={{ padding: '0.5rem 0.8rem', fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>Year {r.year}</td>
                                                    <td style={{ padding: '0.5rem 0.8rem', textAlign: 'right', fontFamily: "'JetBrains Mono', monospace" }}>{formatCurrency(r.noi)}</td>
                                                    <td style={{ padding: '0.5rem 0.8rem', textAlign: 'right', fontFamily: "'JetBrains Mono', monospace", color: 'var(--red)' }}>({formatCurrency(r.ads)})</td>
                                                    <td style={{ padding: '0.5rem 0.8rem', textAlign: 'right', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: r.fcf >= 0 ? 'var(--green)' : 'var(--red)' }}>
                                                        {r.fcf >= 0 ? formatCurrency(r.fcf) : '(' + formatCurrency(Math.abs(r.fcf)) + ')'}
                                                    </td>
                                                    <td style={{ padding: '0.5rem 0.8rem', textAlign: 'right', fontFamily: "'JetBrains Mono', monospace", color: r.ads > 0 && (r.noi / r.ads) >= 1.25 ? 'var(--green)' : r.ads > 0 && (r.noi / r.ads) >= 1.0 ? '#f59e0b' : 'var(--red)' }}>
                                                        {r.ads > 0 ? (r.noi / r.ads).toFixed(2) + 'x' : '—'}
                                                    </td>
                                                </tr>
                                            ))}

const isN = v => v != null && isFinite(v) && !isNaN(v);
const fmtP = (v, d=1) => isN(v) ? v.toFixed(d) + "%" : "—";
const fmtM = v => isN(v) ? "$" + (v / 1e6).toFixed(2) + "M" : "—";

const fmtX = v => isN(v) ? v.toFixed(2) + "x" : "—";

// V2 IRR Calculator (500 iterations, more robust)
const calcIRRv2 = (cfs) => {
  if (!cfs || cfs.length < 2) return null;
  if (!cfs.some(x => x > 0) || !cfs.some(x => x < 0)) return null;
  let r = 0.1;
  for (let i = 0; i < 500; i++) {
    let f = 0, df = 0;
    for (let t = 0; t < cfs.length; t++) {
      const d = Math.pow(1 + r, t);
      f += cfs[t] / d;
      df -= t * cfs[t] / (d * (1 + r));
    }
    if (Math.abs(df) < 1e-14) break;
    const r2 = r - f / df;
    if (Math.abs(r2 - r) < 1e-10) { r = r2; break; }
    r = r2;
    if (r < -0.9999) return null;
  }
  return isN(r) && r > -0.9999 ? r * 100 : null;
};

// V2 Mortgage annual debt service
const mortgageV2 = (principal, annualRate, termYears) => {
  if (principal <= 0) return 0;
  if (annualRate === 0) return principal / termYears;
  const mr = annualRate / 12, n = termYears * 12;
  return principal * (mr * Math.pow(1 + mr, n)) / (Math.pow(1 + mr, n) - 1) * 12;
};

// V2 Financial Engine — faithful port of TSX runModel with configurable waterfall
const runModelV2 = (p, tenants, events, capItems, wf) => {
  const lpPct = (wf.lpPercent || 90) / 100;
  const gpPct = (wf.gpPercent || 10) / 100;
  const pref = (wf.prefReturn || 8) / 100;

  const pp = p.purchasePrice > 0 ? p.purchasePrice : 0;
  const acqCost = pp * ((p.acqCostPct || 0) / 100);
  const close = p.closingCosts || 0;
  const loan = pp * ((p.ltv || 65) / 100);
  const origFee = loan * ((p.origFee || 1) / 100);
  const totalCost = pp + acqCost + close;
  const equity = totalCost - loan + origFee;
  const dsAmort = mortgageV2(loan, (p.rate || 6.25) / 100, p.amort || 30);
  const dsIO = loan * ((p.rate || 6.25) / 100);

  // Rent-roll-driven NOI arrays
  const hold = p.holdPeriod || 5;
  const rrNOI = new Array(hold + 2).fill(0);
  const rrTILC = new Array(hold + 2).fill(0);
  if (p.useRentRoll && tenants.length > 0) {
    const today = new Date();
    tenants.forEach(t => {
      if (!t.sf || !t.rentPSF) return;
      const ls = new Date(t.start), le = new Date(t.end);
      for (let yr = 1; yr <= hold; yr++) {
        const yrStart = new Date(today.getFullYear() + yr - 1, 0, 1);
        if (yrStart > le || yrStart < ls) continue;
        const elapsed = (yrStart - ls) / (365.25 * 86400 * 1000);
        const rent = t.sf * t.rentPSF * Math.pow(1 + (t.escalPct || 0) / 100, elapsed);
        const recov = t.type === "NNN" ? t.sf * ((t.recoveryRatio || 100) / 100) * 4 : 0;
        rrNOI[yr] += rent + recov;
      }
      const tiAmt = t.sf * (t.tiPSF || 0);
      const lcAmt = t.sf * t.rentPSF * ((t.lcPct || 5) / 100);
      const sYr = Math.round((new Date(t.start) - new Date()) / (365.25 * 86400 * 1000));
      const capYr = Math.max(1, Math.min(hold, sYr || 1));
      rrTILC[capYr] += tiAmt + lcAmt;
    });
  }

  const years = [];
  let loanBal = loan;
  for (let yr = 1; yr <= hold; yr++) {
    let noi;
    if (p.useRentRoll && tenants.length > 0) {
      noi = rrNOI[yr] * (1 - (p.vacancy || 7) / 100);
    } else {
      noi = (p.year1NOI || 0) * Math.pow(1 + (p.rentGrowth || 0) / 100, yr - 1) * (1 - (p.vacancy || 0) / 100);
    }
    const useIO = p.isIO && yr <= (p.ioPeriod || 2);
    const annDS = useIO ? dsIO : dsAmort;
    const intPaid = loanBal * ((p.rate || 6.25) / 100);
    const prinPaid = useIO ? 0 : Math.max(0, annDS - intPaid);
    loanBal = Math.max(0, loanBal - prinPaid);
    const capexRes = p.useCapexPct ? noi * ((p.capexReservePct || 2) / 100) : (p.capexReserveFlat || 0);
    const specCapex = capItems.filter(c => c.year === yr).reduce((s, c) => s + (c.amount || 0), 0);
    const tiLC = p.useRentRoll ? rrTILC[yr] : ((p.tiReserve || 0) + noi * ((p.lcReservePct || 0) / 100));
    const vaInc = events.filter(e => e.year === yr && e.type === "income").reduce((s, e) => s + (e.amount || 0), 0);
    const vaCost = events.filter(e => e.year === yr && e.type === "cost").reduce((s, e) => s + (e.amount || 0), 0);
    const levCF = noi - annDS - capexRes - specCapex - tiLC + vaInc - vaCost;
    years.push({ yr, noi, annDS, levCF, loanBal, useIO, capexRes, specCapex, tiLC, vaInc, vaCost, intPaid, prinPaid });
  }

  const lastNOI = years[years.length - 1]?.noi || 0;
  const exitNOI = lastNOI * (1 + (p.rentGrowth || 0) / 100);
  const exitVal = exitNOI / ((p.exitCap || 6) / 100);
  const exitBal = years[years.length - 1]?.loanBal || 0;
  const prepayAmt = exitBal * ((p.prepayPct || 1) / 100);
  const saleNet = exitVal - exitBal - prepayAmt;
  const goingCap = pp > 0 ? (p.year1NOI || 0) / pp * 100 : 0;
  const yoc = totalCost > 0 ? (p.year1NOI || 0) / totalCost * 100 : 0;

  // IRR cash flows
  const opCFs = years.map(y => y.levCF);
  const levCFsForIRR = [-equity, ...opCFs.slice(0, -1), (opCFs[opCFs.length - 1] || 0) + saleNet];
  const unlevCFsForIRR = [-totalCost, ...years.slice(0, -1).map(y => y.noi), (years[years.length - 1]?.noi || 0) + exitVal];

  const levIRR = calcIRRv2(levCFsForIRR);
  const unlevIRR = calcIRRv2(unlevCFsForIRR);
  const totalReturn = levCFsForIRR.slice(1).reduce((s, v) => s + v, 0);
  const em = equity > 0 ? totalReturn / equity : 0;
  const dscr = years[0] ? years[0].noi / Math.max(years[0].annDS, 1) : 0;
  const avgCoC = equity > 0 ? opCFs.reduce((s, v) => s + v, 0) / years.length / equity * 100 : 0;

  // Waterfall with configurable LP/GP split
  const lpEq = equity * lpPct, gpEq = equity * gpPct;
  let pool = totalReturn;
  let lpOut = 0, gpOut = 0;
  const lpROC = Math.min(pool * lpPct, lpEq); pool -= lpROC;
  const gpROC = Math.min(pool * (gpPct / (lpPct + gpPct) || gpPct), gpEq); pool -= gpROC;
  lpOut += lpROC; gpOut += gpROC;
  const lpPrefTotal = lpEq * pref * hold;
  const gpPrefTotal = gpEq * pref * hold;
  const lpPrefPaid = Math.min(pool * lpPct, lpPrefTotal); pool -= lpPrefPaid;
  const gpPrefPaid = Math.min(pool, gpPrefTotal); pool = Math.max(0, pool - gpPrefPaid);
  lpOut += lpPrefPaid; gpOut += gpPrefPaid;
  if (wf.catchUp && pool > 0) { const cu = Math.min(pool, gpPrefTotal * 0.5); gpOut += cu; pool -= cu; }
  if (pool > 0) { const t1 = Math.min(pool, equity * ((wf.tier1Thresh || 15) / 100) * hold * 0.25); lpOut += t1 * ((wf.tier1Split || 80) / 100); gpOut += t1 * (1 - (wf.tier1Split || 80) / 100); pool -= t1; }
  if (pool > 0) { const t2 = Math.min(pool, equity * ((wf.tier2Thresh || 20) / 100) * hold * 0.15); lpOut += t2 * ((wf.tier2Split || 70) / 100); gpOut += t2 * (1 - (wf.tier2Split || 70) / 100); pool -= t2; }
  if (pool > 0) { lpOut += pool * ((wf.tier3Split || 60) / 100); gpOut += pool * (1 - (wf.tier3Split || 60) / 100); }

  const lpOpShare = opCFs.map(cf => cf * lpPct);
  const gpOpShare = opCFs.map(cf => cf * gpPct);
  const lpTerminal = lpOut - lpOpShare.reduce((s, v) => s + v, 0);
  const gpTerminal = gpOut - gpOpShare.reduce((s, v) => s + v, 0);
  const lpCFs = [-lpEq, ...lpOpShare.slice(0, -1), (lpOpShare[lpOpShare.length - 1] || 0) + Math.max(0, lpTerminal)];
  const gpCFs = [-gpEq, ...gpOpShare.slice(0, -1), (gpOpShare[gpOpShare.length - 1] || 0) + Math.max(0, gpTerminal)];
  const lpIRR = calcIRRv2(lpCFs);
  const gpIRR = calcIRRv2(gpCFs);
  const lpEM = lpEq > 0 ? lpOut / lpEq : 0;
  const gpPromote = Math.max(0, gpOut - gpEq);
  const goGreen = (levIRR || 0) >= (p.hurdleIRR || 15) && em >= (p.hurdleEM || 1.75);

  return {
    pp, totalCost, loan, equity, origFee, acqCost,
    years, exitNOI, exitVal, exitBal, saleNet, prepayAmt,
    goingCap, yoc, levIRR, unlevIRR, em, dscr, avgCoC,
    levCFsForIRR, totalReturn,
    lpEq, gpEq, lpOut, gpOut, lpIRR, gpIRR, lpEM, gpPromote,
    goGreen
  };
};

          </div>
        </div>
      </div>

      <h2>Cash Flows (Years 1-${calc.years.length})</h2>
      <table>
        <thead>
          <tr>
            <th>Year</th>
            <th>NOI</th>
            <th>Debt Service</th>
            <th>Net CF</th>
            <th>Loan Balance</th>
          </tr>
        </thead>
        <tbody>
          ${calc.years.map(y => `
            <tr>
              <td>${y.yr}</td>
              <td>${fmtM(y.noi)}</td>
              <td>${fmtM(y.annDS)}</td>
              <td>${fmtM(y.levCF)}</td>
              <td>${fmtM(y.loanBal)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

      <div class="footer">
        Confidential. This memo contains forward-looking statements and assumptions subject to risks and uncertainties.
      </div>
    </body>
    </html>
  `;
  w.document.write(html);
  w.document.close();
};

const exportV2Excel = async (deal, calc, p, wf, tenants, events, capItems) => {
  try {
    const payload = {
      v2_state: {
        assumptions: p,
        waterfall: wf,
        tenants,
        valueAddEvents: events,
        capexItems: capItems,
      },
      calc,
    };
    const res = await fetch(`${API_URL}/api/v1/export/v2`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${deal.name || 'deal'}_analysis.xlsx`;
      a.click();
    }
  } catch (e) {
    console.error('Export failed:', e);
  }
};

  // Hydrate on mount — pull from saved v2_state first, then fall back to parsed OM data
  useEffect(() => {
    if (initialDeal.v2_state) {
      setP(initialDeal.v2_state.assumptions || V2_DEFAULTS);
      setWf(initialDeal.v2_state.waterfall || V2_WF_DEFAULTS);
      setTenants(initialDeal.v2_state.tenants || []);
      setEvents(initialDeal.v2_state.valueAddEvents || []);
      setCapItems(initialDeal.v2_state.capexItems || []);
    } else if (initialDeal.parsed_data) {
      // Fresh upload — seed V2 assumptions from the parsed OM data
      const pd = initialDeal.parsed_data;
      const prop = pd.property || {};
      const fin = pd.financials || {};
      const assum = pd.assumptions || {};
      const rawPrice = prop.asking_price || fin.asking_price || 0;
      const noi = fin.noi || 0;
      const capRate = fin.cap_rate ? (fin.cap_rate > 1 ? fin.cap_rate : fin.cap_rate * 100) : 0;
      const totalSF = prop.total_sf || fin.total_sf || 0;
      const purchasePrice = rawPrice > 0 ? rawPrice : (noi > 0 && capRate > 0 ? Math.round(noi / (capRate / 100)) : V2_DEFAULTS.purchasePrice);
      const address = prop.address ? `${prop.address || ''}${prop.city ? ', ' + prop.city : ''}${prop.state ? ' ' + prop.state : ''}`.trim() : '';

      const hl = [];
      const seeded = { ...V2_DEFAULTS };
      if (prop.name) { seeded.name = prop.name; hl.push('name'); }
      if (address) { seeded.address = address; hl.push('address'); }
      if (prop.property_type) { seeded.assetType = prop.property_type; hl.push('assetType'); }
      if (totalSF > 0) { seeded.sf = totalSF; hl.push('sf'); }
      if (purchasePrice > 0) { seeded.purchasePrice = purchasePrice; hl.push('purchasePrice'); }
      if (noi > 0) { seeded.year1NOI = noi; hl.push('year1NOI'); }
      if (capRate > 0) { seeded.exitCap = capRate; hl.push('exitCap'); }
      // Map parsed assumptions if present
      if (assum.ltv) seeded.ltv = assum.ltv > 1 ? assum.ltv : assum.ltv * 100;
      if (assum.interest_rate) seeded.rate = assum.interest_rate > 1 ? assum.interest_rate : assum.interest_rate * 100;
      if (assum.hold_period) seeded.holdPeriod = assum.hold_period;
      if (assum.amortization_years) seeded.amort = assum.amortization_years;
      if (assum.exit_cap_rate) seeded.exitCap = assum.exit_cap_rate > 1 ? assum.exit_cap_rate : assum.exit_cap_rate * 100;
      if (assum.noi_growth) seeded.rentGrowth = assum.noi_growth > 1 ? assum.noi_growth : assum.noi_growth * 100;

      setP(seeded);
      setHlF(hl);

      // Seed rent roll if parsed
      if (pd.rent_roll && pd.rent_roll.length > 0) {
        const mappedTenants = pd.rent_roll.map((r, i) => ({
          id: i + 1,
          name: r.tenant || r.name || `Tenant ${i + 1}`,
          suite: r.unit || r.suite || '',
          sf: r.sf || 0,
          rentPSF: r.rent_psf || (r.annual_rent && r.sf ? r.annual_rent / r.sf : 0),
          type: 'NNN',
          escalPct: 3,
          start: r.lease_start || r.start || '',
          end: r.lease_end || r.expiry || r.end || '',
          tiPSF: 0,
          lcPct: 5,
          recoveryRatio: 100,
        }));
        setTenants(mappedTenants);
        if (mappedTenants.length > 0) {
          setP(prev => ({ ...prev, useRentRoll: true }));
        }
      }
    }
  }, []);

  // Auto-save
